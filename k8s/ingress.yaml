apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sastaspace
  namespace: sastaspace
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # Block internal endpoints from public access — Prometheus scrapes pod IP directly
    nginx.ingress.kubernetes.io/server-snippet: |
      location /metrics {
        return 404;
      }
spec:
  ingressClassName: public
  rules:
  - host: sastaspace.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: www.sastaspace.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: api.sastaspace.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8080
