apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: sastaspace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: worker
        image: localhost:32000/sastaspace-backend:latest
        securityContext:
          allowPrivilegeEscalation: false
        env:
        - name: MODE
          value: "worker"
        envFrom:
        - configMapRef:
            name: sastaspace-config
        - secretRef:
            name: sastaspace-env
            optional: true
        - secretRef:
            name: sastaspace-db-auth
        volumeMounts:
        - name: sites-data
          mountPath: /data/sites
        - name: claude-auth
          mountPath: /home/appuser/.claude
          readOnly: true
        - name: claude-config
          mountPath: /home/appuser/.claude.json
          subPath: .claude.json
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: sites-data
        persistentVolumeClaim:
          claimName: sites-pvc
      - name: claude-auth
        hostPath:
          path: /home/mkhare/.claude
          type: Directory
      - name: claude-config
        hostPath:
          path: /home/mkhare
          type: Directory
