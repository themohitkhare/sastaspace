# k8s/twenty/redis.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-redis
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-redis
  template:
    metadata:
      labels:
        app: twenty-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-redis
  namespace: twenty
spec:
  selector:
    app: twenty-redis
  ports:
  - port: 6379
    targetPort: 6379
