# k8s/twenty/worker.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-worker
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-worker
  template:
    metadata:
      labels:
        app: twenty-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z twenty-postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
      - name: worker
        image: twentycrm/twenty:latest
        securityContext:
          allowPrivilegeEscalation: false
        command: ["yarn", "worker:prod"]
        envFrom:
        - secretRef:
            name: twenty-env
        startupProbe:
          exec:
            command: ["sh", "-c", "ps aux | grep -q '[y]arn worker:prod'"]
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["sh", "-c", "ps aux | grep -q '[y]arn worker:prod'"]
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
