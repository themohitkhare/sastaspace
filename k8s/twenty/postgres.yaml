# k8s/twenty/postgres.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twenty-postgres
  namespace: twenty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twenty-postgres
  template:
    metadata:
      labels:
        app: twenty-postgres
    spec:
      # Postgres entrypoint needs root to chown data dir, then drops to uid 999 (postgres)
      securityContext:
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: twenty-db
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: twenty-db
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "twenty"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: twenty-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: twenty-postgres
  namespace: twenty
spec:
  selector:
    app: twenty-postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twenty-postgres-pvc
  namespace: twenty
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
