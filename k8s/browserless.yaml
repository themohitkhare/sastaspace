apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless
  namespace: sastaspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browserless
  template:
    metadata:
      labels:
        app: browserless
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: browserless
          image: ghcr.io/browserless/chromium:latest
          ports:
            - containerPort: 3000
          env:
            - name: TIMEOUT
              value: "60000"
            - name: CONCURRENT
              value: "5"
            - name: QUEUED
              value: "10"
            - name: HEALTH
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /json/version
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: browserless
  namespace: sastaspace
spec:
  type: ClusterIP
  selector:
    app: browserless
  ports:
    - port: 3000
      targetPort: 3000
