apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sastaspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: localhost:32000/sastaspace-backend:latest
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: sastaspace-config
        - secretRef:
            name: sastaspace-env
            optional: true
        env:
        - name: MODE
          value: "server"
        - name: CORS_ORIGINS
          value: "https://sastaspace.com"
        volumeMounts:
        - name: sites-data
          mountPath: /data/sites
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: sites-data
        persistentVolumeClaim:
          claimName: sites-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sastaspace
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sites-pvc
  namespace: sastaspace
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
