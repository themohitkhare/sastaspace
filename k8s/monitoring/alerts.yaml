# k8s/monitoring/alerts.yaml
#
# Prometheus alert rules — mounted into Prometheus via ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yml: |
    groups:
      - name: pod-health
        rules:
          - alert: PodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted {{ $value | printf \"%.0f\" }} times in the last 10 minutes."

          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready for 5m"
              description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

      - name: resource-usage
        rules:
          - alert: HighMemoryUsage
            expr: |
              container_memory_working_set_bytes{container!="", container!="POD"}
              / on(namespace, pod, container) kube_pod_container_resource_limits{resource="memory"}
              > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of its memory limit for over 5 minutes."

          - alert: HighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[5m])
              / on(namespace, pod, container) kube_pod_container_resource_limits{resource="cpu"}
              > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage in {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of its CPU limit for over 5 minutes."

      - name: storage
        rules:
          - alert: PVCUsageHigh
            expr: |
              kubelet_volume_stats_used_bytes
              / kubelet_volume_stats_capacity_bytes
              > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} usage > 80%"
              description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full."

      - name: endpoints
        rules:
          - alert: HTTPEndpointDown
            expr: probe_success{job="blackbox-http"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "HTTP endpoint {{ $labels.instance }} is down"
              description: "Blackbox probe for {{ $labels.instance }} has been failing for more than 2 minutes."

      - name: redis
        rules:
          - alert: RedisConnectionFailures
            expr: redis_rejected_connections_total > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Redis rejecting connections"
              description: "Redis instance {{ $labels.instance }} has rejected {{ $value }} connections."

          - alert: RedisDown
            expr: redis_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis instance {{ $labels.instance }} is down"
              description: "Redis exporter reports the instance is unreachable."
