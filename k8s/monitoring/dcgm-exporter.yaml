# AMD GPU Metrics — host-side exporter + k8s Endpoints
#
# rocm-smi requires direct access to GPU sysfs which is impractical in containers.
# Instead, the exporter runs as a systemd service on the host, and k8s
# discovers it via a headless Service + manual Endpoints.
#
# Setup: install the exporter on the host first (see setup instructions below)
# Then apply this manifest to make Prometheus discover it.
#
# Host setup:
#   sudo tee /opt/amd-gpu-exporter.py << 'SCRIPT' && sudo chmod +x /opt/amd-gpu-exporter.py
#   ... (script below)
#   SCRIPT
#   sudo tee /etc/systemd/system/amd-gpu-exporter.service << 'EOF'
#   [Unit]
#   Description=AMD GPU Prometheus Exporter (rocm-smi)
#   After=network.target
#   [Service]
#   Type=simple
#   ExecStart=/usr/bin/python3 /opt/amd-gpu-exporter.py
#   Restart=always
#   RestartSec=5
#   [Install]
#   WantedBy=multi-user.target
#   EOF
#   sudo systemctl daemon-reload && sudo systemctl enable --now amd-gpu-exporter
#
---
# Headless Service pointing to host IP where the exporter runs
apiVersion: v1
kind: Service
metadata:
  name: amd-gpu-exporter
  namespace: monitoring
  labels:
    app: amd-gpu-exporter
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9400"
spec:
  clusterIP: None
  ports:
  - name: metrics
    port: 9400
    targetPort: 9400
---
# Manual Endpoints pointing to the host machine
apiVersion: v1
kind: Endpoints
metadata:
  name: amd-gpu-exporter
  namespace: monitoring
subsets:
- addresses:
  - ip: 192.168.0.38
  ports:
  - name: metrics
    port: 9400
