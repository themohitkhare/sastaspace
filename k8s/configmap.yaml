apiVersion: v1
kind: ConfigMap
metadata:
  name: sastaspace-config
  namespace: sastaspace
data:
  CLAUDE_CODE_API_URL: "http://192.168.0.37:8000/v1"
  SASTASPACE_SITES_DIR: "/data/sites"
  # REDIS_URL and MONGODB_URL moved to sastaspace-db-auth secret (contain credentials)
  MONGODB_DB: "sastaspace"
  OLLAMA_URL: "http://192.168.0.37:11434/v1"
  BROWSERLESS_URL: "ws://browserless:3000"
  GEMINI_API_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
  # Route composer to Gemini — claude-code-api returns tool calls that Agno can't handle
  COMPOSER_MODEL_PROVIDER: "gemini"
  BUILDER_MODEL_PROVIDER: "gemini"
  # Swarm pipeline — enable for new 14-agent swarm redesign pipeline
  USE_SWARM_PIPELINE: "true"
