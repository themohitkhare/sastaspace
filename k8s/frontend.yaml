apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sastaspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: frontend
        image: localhost:32000/sastaspace-frontend:latest
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3000
        # NEXT_PUBLIC_BACKEND_URL and NEXT_PUBLIC_TURNSTILE_SITE_KEY are set via
        # --build-arg at image build time for client components (see CI workflow).
        # Server-side secrets (Resend, Turnstile secret, owner email) are injected
        # at runtime via the secretRef below — they're only used in API routes.
        envFrom:
        - secretRef:
            name: sastaspace-frontend-env
            optional: true
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 3000
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sastaspace
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
