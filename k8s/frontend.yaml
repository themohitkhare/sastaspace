apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sastaspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: frontend
        image: localhost:32000/sastaspace-frontend:latest
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3000
        # NEXT_PUBLIC_* vars are injected at runtime via entrypoint.sh (not baked at build time).
        # Server-side secrets (Resend, Turnstile secret, owner email) come from the secretRef below.
        env:
        - name: NEXT_PUBLIC_BACKEND_URL
          value: "https://api.sastaspace.com"
        - name: NEXT_PUBLIC_TURNSTILE_SITE_KEY
          valueFrom:
            secretKeyRef:
              name: sastaspace-frontend-env
              key: NEXT_PUBLIC_TURNSTILE_SITE_KEY
              optional: true
        - name: NEXT_PUBLIC_ENABLE_TURNSTILE
          value: "true"
        envFrom:
        - secretRef:
            name: sastaspace-frontend-env
            optional: true
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /
            port: 3000
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sastaspace
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
