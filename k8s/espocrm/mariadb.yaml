apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: espocrm-mariadb-pvc
  namespace: espocrm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: espocrm-mariadb
  namespace: espocrm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: espocrm-mariadb
  template:
    metadata:
      labels:
        app: espocrm-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:11
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: espocrm-env
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: espocrm
            - name: MYSQL_USER
              value: espocrm
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: espocrm-env
                  key: ESPOCRM_DATABASE_PASSWORD
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: espocrm-mariadb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: espocrm-mariadb
  namespace: espocrm
spec:
  selector:
    app: espocrm-mariadb
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
