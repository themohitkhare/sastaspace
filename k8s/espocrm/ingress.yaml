apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: espocrm-ingress
  namespace: espocrm
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: public
  rules:
    - host: crm.sastaspace.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: espocrm
                port:
                  number: 80
---
# Allow ingress from sastaspace namespace (backend + worker lead sync)
# and from nginx ingress controller (public web UI)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-sastaspace-ingress
  namespace: espocrm
spec:
  podSelector:
    matchLabels:
      app: espocrm
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sastaspace
      ports:
        - port: 80
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress
      ports:
        - port: 80
          protocol: TCP
  policyTypes:
    - Ingress
