# Rails 8 landing — MicroK8s Deployment + Service.
#
# Mounts two Secrets:
#   • sastaspace-rails-landing-runtime — per-app secrets (RAILS_MASTER_KEY,
#     SECRET_KEY_BASE, GOOGLE_CLIENT_ID/SECRET, LITELLM_API_KEY)
#   • postgres-credentials              — shared DB password (for POSTGRES_URL)
#
# Image comes from the in-cluster registry (localhost:32000). Build + push
# with scripts/k8s-deploy.sh <name> (or similar rsync-on-host flow).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing-rails
  namespace: sastaspace
  labels:
    app: landing-rails
    tier: app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: landing-rails
  template:
    metadata:
      labels:
        app: landing-rails
        tier: app
    spec:
      containers:
        - name: landing-rails
          image: localhost:32000/sastaspace-landing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: RAILS_ENV
              value: production
            - name: RAILS_LOG_TO_STDOUT
              value: "1"
            - name: RAILS_SERVE_STATIC_FILES
              value: "1"
            # Thruster defaults to :80; under non-root k8s user 1000 that
            # fails with "bind: permission denied". Pin both the thruster
            # front and the Rails target to 3000 (container-internal).
            - name: HTTP_PORT
              value: "3000"
            - name: TARGET_PORT
              value: "3001"
            - name: PORT
              value: "3001"
            - name: LITELLM_BASE_URL
              value: "http://litellm.sastaspace.svc.cluster.local:4000"
            # POSTGRES_URL is assembled from host (pod DNS) + password Secret.
            - name: POSTGRES_HOST
              value: "postgres.sastaspace.svc.cluster.local"
            - name: POSTGRES_DB
              value: "sastaspace"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/$(POSTGRES_DB)"
          envFrom:
            - secretRef:
                name: sastaspace-rails-landing-runtime
          readinessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /up
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: landing-rails
  namespace: sastaspace
  labels:
    app: landing-rails
spec:
  type: ClusterIP
  selector:
    app: landing-rails
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
