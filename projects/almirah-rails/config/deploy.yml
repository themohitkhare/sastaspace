# Kamal deploy config template for sastaspace path-routed Rails apps.
#
# Usage: copy this file into projects/<name>/config/deploy.yml and replace
# every occurrence of almirah with your project slug (e.g. "almirah") and
# 3002 with the app's internal Puma port (landing=3001, almirah=3002, etc).
#
# Landing app (root path "/") does NOT set path_prefix.
# Every other app sets path_prefix to "/<name>".
#
# Run `kamal deploy` from projects/<name>/ after filling in secrets in
# .kamal/secrets (see the documented template at the bottom of this file).
#
# Architecture recap:
#   Cloudflare tunnel → cloudflared → kamal-proxy:80 → Puma container
#   TLS is terminated at Cloudflare. kamal-proxy serves plain HTTP.

service: sastaspace-almirah

# --------------------------------------------------------------------------
# Image
# --------------------------------------------------------------------------
# We reuse the MicroK8s-local registry (localhost:32000) because it is already
# running on the prod host. Switch to ghcr.io or Docker Hub if you want
# to deploy from a machine other than the dev laptop.
image: localhost:32000/sastaspace-almirah

# --------------------------------------------------------------------------
# Servers
# --------------------------------------------------------------------------
servers:
  web:
    hosts:
      - 192.168.0.37
    labels:
      # kamal-proxy reads traefik-style labels to decide which container
      # handles which requests.
      #
      # Landing (root): comment out path_prefix entirely.
      # Every other app: uncomment and set to "/<name>".
      #
      # traefik.http.routers.sastaspace-almirah.rule:
      #   "Host(`sastaspace.com`) && PathPrefix(`/almirah`)"
      #
      # kamal-proxy v0.9+ reads kamal-proxy.path_prefix directly:
      kamal-proxy.path_prefix: /almirah
      # Remove the line above and uncomment the one below for the landing app:
      # (no path_prefix label → kamal-proxy routes all unmatched requests here)

    # Health-check path. For path-prefixed apps kamal-proxy checks the prefixed
    # URL. For landing use "/" directly.
    healthcheck:
      path: /almirah/up
      port: 3002
      max_attempts: 10
      interval: 3s

# --------------------------------------------------------------------------
# Registry
# --------------------------------------------------------------------------
# localhost:32000 accepts plain HTTP — no credentials needed from the
# deploy machine as long as the push happens *on* the host (builder=remote)
# or the registry is reachable from the builder.
registry:
  server: localhost:32000
  username:
    - REGISTRY_USERNAME        # set to "unused" in .kamal/secrets if no auth
  password:
    - REGISTRY_PASSWORD        # set to "unused" in .kamal/secrets if no auth

# --------------------------------------------------------------------------
# Builder
# --------------------------------------------------------------------------
# The prod host (taxila) is Ubuntu on x86_64. Build there so the image arch
# matches without emulation overhead.
builder:
  arch: amd64
  # Build on the remote host via SSH. This avoids cross-arch emulation on
  # a dev laptop and keeps the image local to the push target.
  remote:
    host: ssh://192.168.0.37
  # Build context is the Rails app root (directory containing Dockerfile).
  # Kamal defaults to the directory containing deploy.yml's parent — correct
  # for projects/<name>/config/deploy.yml → projects/<name>/ as the build root.
  cache:
    type: registry
    options: mode=max
    image: localhost:32000/sastaspace-almirah-build-cache

# --------------------------------------------------------------------------
# Environment variables
# --------------------------------------------------------------------------
env:
  clear:
    # Rails mandatory settings
    RAILS_ENV: production
    # Path-prefix apps must set this so asset URLs, redirect URLs, and route
    # helpers all emit the correct absolute path.
    # Landing: omit or set to "".
    RAILS_RELATIVE_URL_ROOT: /almirah
    # Puma listens on 3002. Each app gets its own port so they can all run
    # simultaneously on the same host without fighting kamal-proxy.
    PORT: "3002"
    # LiteLLM (Anthropic-compatible proxy for Gemma 4)
    LITELLM_BASE_URL: "http://192.168.0.37:4000"
  secret:
    # Sourced from .kamal/secrets at deploy time. Never commit .kamal/secrets.
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - POSTGRES_URL
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - LITELLM_API_KEY
    - REGISTRY_USERNAME
    - REGISTRY_PASSWORD

# --------------------------------------------------------------------------
# Accessories (shared infrastructure not managed by this app's Kamal config)
# --------------------------------------------------------------------------
# Postgres is already running as a MicroK8s pod. Do NOT declare it here —
# Kamal accessories would try to create a second instance.
# If you migrate Postgres out of k8s, add an accessory block like:
#
# accessories:
#   db:
#     image: supabase/postgres:17.4.1.042
#     host: 192.168.0.37
#     port: 5432
#     volumes:
#       - /data/postgres:/var/lib/postgresql/data
#     env:
#       secret:
#         - POSTGRES_PASSWORD

# --------------------------------------------------------------------------
# kamal-proxy settings
# --------------------------------------------------------------------------
# kamal-proxy is a shared singleton on the host — it is NOT re-deployed per
# app. Run `kamal proxy boot` once (see scripts/bootstrap-kamal.sh).
# The settings below tune per-app behaviour on the proxy.
proxy:
  ssl: false                 # TLS is terminated at Cloudflare, not here
  host: sastaspace.com
  # app_port must match the PORT env var above.
  app_port: 3002
  buffering:
    requests: false
    responses: false
  response_timeout: 30
  healthcheck:
    interval: 3
    path: /almirah/up
    timeout: 5

# --------------------------------------------------------------------------
# SSH
# --------------------------------------------------------------------------
ssh:
  user: mkhare               # Linux account on 192.168.0.37 (taxila)
  # The deploy key must be in ~/.ssh/known_hosts on the dev machine.
  # First-time setup: `ssh-keyscan 192.168.0.37 >> ~/.ssh/known_hosts`

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
logging:
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
