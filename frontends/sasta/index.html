<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sasta - SastaSpace</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #000000;
        --accent: #00ff00;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        background: var(--bg);
        color: var(--fg);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 2.5rem 1.5rem;
      }
      .card {
        border: 4px solid #000;
        box-shadow: 6px 6px 0px 0px #000;
        padding: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem 0;
        font-size: 2rem;
        line-height: 1.1;
      }
      p {
        margin: 0 0 1.25rem 0;
        line-height: 1.6;
      }
      a.button {
        display: inline-block;
        text-decoration: none;
        border: 3px solid #000;
        background: #000;
        color: #fff;
        padding: 0.75rem 1.25rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow: 4px 4px 0px 0px #000;
      }
      a.button:hover {
        background: var(--accent);
        color: #000;
        box-shadow: none;
        transform: translate(1px, 1px);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="card">
        <h1>SASTA</h1>
        <p>This sub-application isn’t wired up for local yet. The route now serves a placeholder page instead of a 403.</p>
        <a class="button" href="/">Back to SastaSpace</a>
      </div>
    </main>
  </body>
</html>
