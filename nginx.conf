events {
    worker_connections 1024;
}

http {
    upstream django_backend {
        server django:8000;
        # Docker Swarm will automatically load balance between multiple django instances
    }

    upstream frontend_app {
        server frontend:3000;
        # Docker Swarm will automatically load balance between multiple frontend instances
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=20r/s;

    server {
        listen 80;
        server_name localhost;

        # Frontend routes
        location / {
            limit_req zone=frontend burst=20 nodelay;
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint
        location /health/ {
            proxy_pass http://django_backend;
            access_log off;
        }

        # Static files (if served by Django)
        location /static/ {
            proxy_pass http://django_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files (if served by Django)
        location /media/ {
            proxy_pass http://django_backend;
            expires 1y;
            add_header Cache-Control "public";
        }
    }
} 