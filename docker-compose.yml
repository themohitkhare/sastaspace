# Docker Compose for LOCAL DEVELOPMENT
# All services run on localhost with direct port access and Traefik routing
#
# Direct Access URLs:
#   - Backend API: http://localhost:8000
#   - Main Frontend: http://localhost:9000
#   - SastaDice: http://localhost:9001
#   - SastaHero: http://localhost:9002
#   - Sudoku: http://localhost:9004
#   - Traefik Dashboard: http://localhost:8080
#   - Grafana (Logs): http://localhost:3000
#   - Loki API: http://localhost:3100
#
# Traefik Routing (through localhost:80):
#   - Backend API: http://localhost/api/v1/...
#   - Main Frontend: http://localhost/
#   - SastaDice: http://localhost/sastadice/
#   - SastaHero: http://localhost/sastahero/
#   - Sudoku: http://localhost/sudoku/
#
# Backend has hot-reload enabled (--reload flag)
# Frontends are built images (use npm run dev locally for hot-reload)

services:
  traefik:
    image: traefik:v2.11
    container_name: sastaspace-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"  # Debug logging for dev
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sastaspace-network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: sastaspace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ./backend/data/mongodb:/data/db
    networks:
      - sastaspace-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sastaspace-backend
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=sastaspace
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      # Mount source code for live reloading (read-write for uvicorn --reload)
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/tests:/app/tests
      - ./backend/scripts:/app/scripts
      - ./backend/conftest.py:/app/conftest.py
    ports:
      - "8000:8000"  # Direct access for development
    networks:
      - sastaspace-network
    depends_on:
      - mongodb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  frontend-main:
    build:
      context: ./frontends
      dockerfile: sastaspace/Dockerfile
    container_name: sastaspace-frontend-main
    ports:
      - "9000:80"  # Direct access: http://localhost:9000
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-main.rule=Host(`localhost`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/sastahero`) && !PathPrefix(`/sastadice`) && !PathPrefix(`/sudoku`)"
      - "traefik.http.routers.frontend-main.entrypoints=web"
      - "traefik.http.services.frontend-main.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend-main.priority=1"
    restart: unless-stopped

  frontend-sastahero:
    build:
      context: ./frontends
      dockerfile: sastahero/Dockerfile
    container_name: sastaspace-frontend-sastahero
    ports:
      - "9002:80"  # Direct access: http://localhost:9002
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sastahero.rule=Host(`localhost`) && PathPrefix(`/sastahero`)"
      - "traefik.http.routers.frontend-sastahero.entrypoints=web"
      - "traefik.http.services.frontend-sastahero.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sastahero-stripprefix.stripprefix.prefixes=/sastahero"
      - "traefik.http.routers.frontend-sastahero.middlewares=sastahero-stripprefix"
    restart: unless-stopped

  frontend-sastadice:
    build:
      context: ./frontends
      dockerfile: sastadice/Dockerfile
    container_name: sastaspace-frontend-sastadice
    ports:
      - "9001:80"  # Direct access: http://localhost:9001
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sastadice.rule=Host(`localhost`) && PathPrefix(`/sastadice`)"
      - "traefik.http.routers.frontend-sastadice.entrypoints=web"
      - "traefik.http.services.frontend-sastadice.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sastadice-stripprefix.stripprefix.prefixes=/sastadice"
      - "traefik.http.routers.frontend-sastadice.middlewares=sastadice-stripprefix"
    restart: unless-stopped

  frontend-sudoku:
    build:
      context: ./frontends
      dockerfile: sudoku/Dockerfile
    container_name: sastaspace-frontend-sudoku
    ports:
      - "9004:80"  # Direct access: http://localhost:9004
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sudoku.rule=Host(`localhost`) && PathPrefix(`/sudoku`)"
      - "traefik.http.routers.frontend-sudoku.entrypoints=web"
      - "traefik.http.services.frontend-sudoku.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sudoku-stripprefix.stripprefix.prefixes=/sudoku"
      - "traefik.http.routers.frontend-sudoku.middlewares=sudoku-stripprefix"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: sastaspace-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - ./loki/data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sastaspace-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: sastaspace-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - sastaspace-network
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sastaspace-grafana
    user: "472:472"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PATHS_DATA=/var/lib/grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/data:/var/lib/grafana
    networks:
      - sastaspace-network
    depends_on:
      - loki
    restart: unless-stopped

networks:
  sastaspace-network:
    driver: bridge
