# Docker Compose for LOCAL DEVELOPMENT
# All services run on localhost with direct port access and Traefik routing
#
# Direct Access URLs:
#   - Backend API: http://localhost:8000
#   - Main Frontend: http://localhost:9000
#   - SastaDice: http://localhost:9001
#   - SastaHero: http://localhost:9002
#   - Sasta: http://localhost:9003
#   - Traefik Dashboard: http://localhost:8080
#
# Traefik Routing (through localhost:80):
#   - Backend API: http://localhost/api/v1/...
#   - Main Frontend: http://localhost/
#   - SastaDice: http://localhost/sastadice/
#   - SastaHero: http://localhost/sastahero/
#   - Sasta: http://localhost/sasta/
#
# Backend has hot-reload enabled (--reload flag)
# Frontends are built images (use npm run dev locally for hot-reload)

services:
  traefik:
    image: traefik:v2.11
    container_name: sastaspace-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"  # Debug logging for dev
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - sastaspace-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sastaspace-backend
    environment:
      - DB_PATH=/app/data/sastaspace.db
      - DEBUG=true
      - ENVIRONMENT=development
    volumes:
      # Mount source code for live reloading (read-write for uvicorn --reload)
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/tests:/app/tests
      - ./backend/conftest.py:/app/conftest.py
    ports:
      - "8000:8000"  # Direct access for development
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.backend-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=backend-stripprefix"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped

  frontend-main:
    build:
      context: ./frontends/sastaspace
      dockerfile: Dockerfile
    container_name: sastaspace-frontend-main
    ports:
      - "9000:80"  # Direct access: http://localhost:9000
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-main.rule=Host(`localhost`) && PathPrefix(`/`) && !PathPrefix(`/api`) && !PathPrefix(`/sastahero`) && !PathPrefix(`/sasta`) && !PathPrefix(`/sastadice`)"
      - "traefik.http.routers.frontend-main.entrypoints=web"
      - "traefik.http.services.frontend-main.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend-main.priority=1"
    restart: unless-stopped

  frontend-sastahero:
    image: nginx:alpine
    container_name: sastaspace-frontend-sastahero
    volumes:
      - ./frontends/sastahero:/usr/share/nginx/html:ro
    ports:
      - "9002:80"  # Direct access: http://localhost:9002
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sastahero.rule=Host(`localhost`) && PathPrefix(`/sastahero`)"
      - "traefik.http.routers.frontend-sastahero.entrypoints=web"
      - "traefik.http.services.frontend-sastahero.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sastahero-stripprefix.stripprefix.prefixes=/sastahero"
      - "traefik.http.routers.frontend-sastahero.middlewares=sastahero-stripprefix"
    restart: unless-stopped

  frontend-sasta:
    image: nginx:alpine
    container_name: sastaspace-frontend-sasta
    volumes:
      - ./frontends/sasta:/usr/share/nginx/html:ro
    ports:
      - "9003:80"  # Direct access: http://localhost:9003
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sasta.rule=Host(`localhost`) && PathPrefix(`/sasta`)"
      - "traefik.http.routers.frontend-sasta.entrypoints=web"
      - "traefik.http.services.frontend-sasta.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sasta-stripprefix.stripprefix.prefixes=/sasta"
      - "traefik.http.routers.frontend-sasta.middlewares=sasta-stripprefix"
    restart: unless-stopped

  frontend-sastadice:
    build:
      context: ./frontends/sastadice
      dockerfile: Dockerfile
    container_name: sastaspace-frontend-sastadice
    ports:
      - "9001:80"  # Direct access: http://localhost:9001
    networks:
      - sastaspace-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend-sastadice.rule=Host(`localhost`) && PathPrefix(`/sastadice`)"
      - "traefik.http.routers.frontend-sastadice.entrypoints=web"
      - "traefik.http.services.frontend-sastadice.loadbalancer.server.port=80"
      - "traefik.http.middlewares.sastadice-stripprefix.stripprefix.prefixes=/sastadice"
      - "traefik.http.routers.frontend-sastadice.middlewares=sastadice-stripprefix"
    restart: unless-stopped

networks:
  sastaspace-network:
    driver: bridge
