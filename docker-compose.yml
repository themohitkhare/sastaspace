services:
  mongodb:
    image: mongo:6.0
    container_name: sastaspace-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping: 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    # Remove container_name when using replicas
    # container_name: sastaspace-django
    command: bash -c "gunicorn sastaspace_project.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      replicas: 1  # Set to 1 for regular docker-compose
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
  frontend:
    build:
      context: ./frontend
    # Remove container_name when using replicas
    # container_name: sastaspace-frontend
    ports:
      - "3000:3000"
    depends_on:
      - django
    deploy:
      replicas: 1  # Set to 1 for regular docker-compose
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
volumes:
  mongo_data:
