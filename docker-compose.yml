services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sastaspace
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sastaspace
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "3100:3000"
    environment:
      - TIMEOUT=60000
      - CONCURRENT=5
      - QUEUED=10
      - HEALTH=true
    networks:
      - sastaspace
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/json/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - CLAUDE_CODE_API_URL=http://host.docker.internal:8000/v1
      - CORS_ORIGINS=http://localhost:3000
      - SASTASPACE_SITES_DIR=/data/sites
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=sastaspace
      - BROWSERLESS_URL=ws://browserless:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - sites_data:/data/sites
    networks:
      - sastaspace
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
    networks:
      - sastaspace
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  tests:
    build:
      context: ./web
      dockerfile: Dockerfile.test
    profiles:
      - test
    environment:
      - BASE_URL=http://frontend:3000
    networks:
      - sastaspace
    depends_on:
      frontend:
        condition: service_healthy

networks:
  sastaspace:
    driver: bridge

volumes:
  sites_data:
  redis_data:
  mongo_data:
