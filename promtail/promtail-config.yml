server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs (static config to avoid API version issues)
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Extract container name from log path
      - regex:
          expression: '/var/lib/docker/containers/(?P<container_id>[^/]+)/.*'
          source: filename
      
      # Read container metadata from Docker (if available)
      - docker: {}
      
      # Try to parse JSON logs first
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            module: module
            service: service
          drop_malformed: true
      
      # Extract service name from container name
      - regex:
          expression: 'sastaspace-(?P<service>[^-]+)'
          source: container
          drop_malformed: false
      
      # Extract log level from plain text if JSON parsing failed
      - regex:
          expression: '"(?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL)"'
          source: line
          drop_malformed: false
      
      # Extract level from message if still not found
      - regex:
          expression: '(?P<level>INFO|WARNING|ERROR|DEBUG|CRITICAL)'
          source: message
          drop_malformed: false
      
      # Set labels for filtering
      - labels:
          level:
          module:
          service:
          container:
      
      # Output the message
      - output:
          source: message
