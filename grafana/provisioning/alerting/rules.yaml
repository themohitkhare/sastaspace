apiVersion: 1
groups:
  - orgId: 1
    name: sastaspace-alerts
    folder: SastaSpace
    interval: 1m
    rules:
      - uid: sastaspace-high-error-rate
        title: HighErrorRate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: rate(redesign_errors_total[5m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: rate(redesign_requests_total[5m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: ($A / $B) > 0.10
        for: 5m
        annotations:
          summary: "Redesign error rate exceeds 10% for 5 minutes"
          description: "Error rate is {{ $values.C }}. Check redesign pipeline health."
        labels:
          severity: critical
          service: sastaspace

      - uid: sastaspace-high-latency
        title: HighLatency
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: Prometheus
            model:
              expr: histogram_quantile(0.95, rate(redesign_latency_seconds_bucket[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [300]
        for: 5m
        annotations:
          summary: "P95 redesign latency exceeds 300s for 5 minutes"
          description: "P95 latency is {{ $values.A }}s. Pipeline may be degraded."
        labels:
          severity: warning
          service: sastaspace

      - uid: sastaspace-no-connections
        title: NoActiveConnections
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: Prometheus
            model:
              expr: active_sse_connections
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 1800
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        for: 30m
        annotations:
          summary: "No active SSE connections for 30 minutes"
          description: "Zero active connections may indicate the service is down or unreachable."
        labels:
          severity: warning
          service: sastaspace
