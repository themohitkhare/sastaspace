name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["status: todo", "type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I try to upload an image larger than 10MB, the app crashes instead of showing an error message.
    validations:
      required: true
      
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to 'Inventory Items'
        2. Click on 'Add New Item'
        3. Upload an image file larger than 10MB
        4. See error
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The app should show a validation error message saying "File size must be less than 10MB"
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: The app crashes with a 500 error and no user-friendly message
    validations:
      required: true
      
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Critical (App crashes, data loss)
        - P1 - High (Major feature broken)
        - P2 - Medium (Minor feature broken)
        - P3 - Low (Cosmetic issue)
    validations:
      required: true
      
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Environment details
      placeholder: |
        - OS: macOS 14.0
        - Browser: Chrome 120
        - Rails version: 8.1.1
        - Ruby version: 3.3.0
      
  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Relevant error logs or stack traces
      placeholder: Paste error logs or stack traces here
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem
      placeholder: This only happens when uploading PNG files, JPEG files work fine.
