name: Feature Request
description: Request a new feature for SastaSpace
title: "[Feature] "
labels: ["status: todo", "needs: architecture"]
body:
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: As a [user], I want [goal] so that [benefit]
      placeholder: As a fashion enthusiast, I want to filter my wardrobe by color so that I can plan coordinated outfits.
    validations:
      required: true
      
  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Frontend (UI/UX)
        - Backend (API/Services)
        - AI/ML (Ollama Integration)
        - Infrastructure (Database/Jobs)
    validations:
      required: true
      
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Blocking (Critical bug or blocker)
        - P1 - High (Important feature)
        - P2 - Medium (Nice to have)
        - P3 - Low (Future enhancement)
    validations:
      required: true
      
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: List the specific conditions that must be met for this feature to be considered complete
      placeholder: |
        - Given I am a logged-in user, when I upload an image, then the AI should analyze and categorize it
        - Given I have reached my quota, when I try to add an item, then I should see an upgrade prompt
      value: |
        - Given [context], when [action], then [outcome]
    validations:
      required: true
      
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, examples, technical considerations, or related issues
      placeholder: Include screenshots, Figma links, API examples, or links to related issues
      
  - type: checkboxes
    id: technical-notes
    attributes:
      label: Technical Considerations
      options:
        - label: Requires database migration
        - label: Requires background job
        - label: Requires AI/Ollama integration
        - label: Requires API endpoint
        - label: Requires frontend UI changes
        - label: Requires authentication/authorization changes
