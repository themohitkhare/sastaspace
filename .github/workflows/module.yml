name: module

on:
  push:
    branches: [main]
    paths:
      - "module/**"
      - ".github/workflows/module.yml"
  pull_request:
    paths:
      - "module/**"
  workflow_dispatch:

concurrency:
  group: module-${{ github.ref }}
  cancel-in-progress: true

env:
  STDB_SERVER_URL: https://stdb.sastaspace.com
  STDB_MODULE_NAME: sastaspace
  STDB_CLI_VERSION: "2.1.0"

jobs:
  test-and-publish:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with: { workspaces: module }

      - name: fmt
        working-directory: module
        run: cargo fmt --all --check

      - name: clippy
        working-directory: module
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: test
        working-directory: module
        run: cargo test --all

      - name: install spacetime cli
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          if ! command -v spacetime >/dev/null 2>&1; then
            curl -sSf https://install.spacetimedb.com | sh -s -- --yes
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          "$HOME/.local/bin/spacetime" version install "$STDB_CLI_VERSION" || true
          "$HOME/.local/bin/spacetime" version use "$STDB_CLI_VERSION"
          "$HOME/.local/bin/spacetime" --version

      - name: register prod server (idempotent)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          spacetime server add prod --url "$STDB_SERVER_URL" --no-fingerprint || \
            spacetime server set-default prod

      - name: configure auth (owner identity)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}
        run: |
          if [[ -z "$SPACETIME_TOKEN" ]]; then
            echo "::error::SPACETIME_TOKEN unset — publish will fail with permission denied because the module already has an owner. Set the secret to the value of spacetimedb_token from your local ~/.config/spacetime/cli.toml."
            exit 1
          fi
          spacetime login --token "$SPACETIME_TOKEN"

      - name: publish module
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          spacetime publish \
            --server prod \
            --module-path module \
            "$STDB_MODULE_NAME" \
            -y

      - name: generate ts bindings
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          spacetime generate \
            --lang typescript \
            --out-dir packages/stdb-bindings/src/generated \
            --module-path module

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          name: stdb-bindings
          path: packages/stdb-bindings/src/generated
          retention-days: 7

      - name: trigger landing rebuild
        if: success() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run landing.yml --ref ${{ github.ref_name }} \
            -f bindings_run_id=${{ github.run_id }} || true
