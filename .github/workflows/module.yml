name: module

on:
  push:
    branches: [main]
    paths:
      - "module/**"
      - ".github/workflows/module.yml"
  pull_request:
    paths:
      - "module/**"
  workflow_dispatch:

concurrency:
  group: module-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  STDB_SERVER_URL: https://stdb.sastaspace.com
  STDB_MODULE_NAME: sastaspace
  STDB_CLI_VERSION: "2.1.0"
  COVERAGE_MIN_LINES: "20"

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: module
          # save-if true only on main pushes — skips the ~50s cache pack
          # on PR runs and on no-op pushes that didn't change Cargo.lock.
          save-if: ${{ github.ref == 'refs/heads/main' && hashFiles('module/Cargo.lock') != '' }}

      - name: install cargo extras
        run: |
          which cargo-audit >/dev/null 2>&1 || cargo install cargo-audit --locked
          which cargo-llvm-cov >/dev/null 2>&1 || cargo install cargo-llvm-cov --locked

      - name: fmt
        working-directory: module
        run: cargo fmt --all --check

      - name: clippy
        working-directory: module
        run: cargo clippy --target wasm32-unknown-unknown --all-targets -- -D warnings

      - name: cargo audit
        working-directory: module
        run: cargo audit --deny warnings

      # `cargo llvm-cov` already builds + runs the tests, so a separate
      # `cargo test` step would be redundant. The threshold gates failure.
      - name: test + coverage
        working-directory: module
        run: cargo llvm-cov --summary-only --fail-under-lines $COVERAGE_MIN_LINES --lcov --output-path lcov.info

      - uses: actions/upload-artifact@v4
        with:
          name: module-coverage
          path: module/lcov.info
          retention-days: 7

  publish:
    needs: gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: module
          # save-if true only on main pushes — skips the ~50s cache pack
          # on PR runs and on no-op pushes that didn't change Cargo.lock.
          save-if: ${{ github.ref == 'refs/heads/main' && hashFiles('module/Cargo.lock') != '' }}

      - name: install spacetime cli
        run: |
          if ! command -v spacetime >/dev/null 2>&1; then
            curl -sSf https://install.spacetimedb.com | sh -s -- --yes
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          "$HOME/.local/bin/spacetime" version install "$STDB_CLI_VERSION" || true
          "$HOME/.local/bin/spacetime" version use "$STDB_CLI_VERSION"

      - name: register prod server
        run: |
          spacetime server add prod --url "$STDB_SERVER_URL" --no-fingerprint || \
            spacetime server set-default prod

      - name: configure auth (owner identity)
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}
        run: |
          if [[ -z "$SPACETIME_TOKEN" ]]; then
            echo "::error::SPACETIME_TOKEN unset — publish would create a stranger identity that the server rejects as non-owner."
            exit 1
          fi
          spacetime login --token "$SPACETIME_TOKEN"

      - name: publish module
        run: |
          spacetime publish --server prod --module-path module "$STDB_MODULE_NAME" -y

      - name: regenerate ts bindings
        run: |
          spacetime generate \
            --lang typescript \
            --out-dir packages/stdb-bindings/src/generated \
            --module-path module

      - uses: actions/upload-artifact@v4
        with:
          name: stdb-bindings
          path: packages/stdb-bindings/src/generated
          retention-days: 7

      - name: trigger landing rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run landing.yml --ref ${{ github.ref_name }} \
            -f bindings_run_id=${{ github.run_id }} || true
