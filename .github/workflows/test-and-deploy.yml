name: Test and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Run tests
      run: |
        cd backend
        python -m pytest apps/ \
          --cov=apps \
          --cov-report=term-missing \
          --cov-report=html:htmlcov \
          --cov-report=xml \
          --cov-fail-under=80 \
          -v \
          --tb=short
      env:
        DJANGO_SETTINGS_MODULE: sastaspace_project.settings
        MONGODB_HOST: localhost
        MONGODB_PORT: 27017
        MONGODB_NAME: test_db
    
    - name: Run code quality checks
      run: |
        cd backend
        python -m flake8 apps/ --max-line-length=100 --ignore=E501,W503
        python -m black --check apps/
        python -m isort --check-only apps/
    
    - name: Run security checks
      run: |
        cd backend
        python -m bandit -r apps/ -f txt
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
    
    - name: Build and push Backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile.prod
        target: production
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/sastaspace-django:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/sastaspace-django:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/sastaspace-frontend:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/sastaspace-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Deploy to production
      run: |
        # Add your deployment commands here
        # Example for Docker Swarm:
        # docker stack deploy -c docker-compose.swarm.yml sastaspace
        echo "Deployment completed successfully"
      env:
        DOCKER_HOST: ${{ secrets.DOCKER_HOST }}
        DOCKER_TLS_VERIFY: ${{ secrets.DOCKER_TLS_VERIFY }}
        DOCKER_CERT_PATH: ${{ secrets.DOCKER_CERT_PATH }}

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif' 