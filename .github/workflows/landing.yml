name: landing

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/design-tokens/**"
      - "packages/stdb-bindings/**"
      - "infra/landing/nginx.conf"
      - ".github/workflows/landing.yml"
  pull_request:
    paths:
      - "apps/landing/**"
      - "packages/design-tokens/**"
      - "packages/stdb-bindings/**"
  workflow_dispatch:
    inputs:
      bindings_run_id:
        description: "module workflow run id whose bindings artifact to download (optional)"
        required: false
        type: string

concurrency:
  group: landing-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_STDB_URI: wss://stdb.sastaspace.com
  NEXT_PUBLIC_STDB_MODULE: sastaspace
  LANDING_OUT_DIR: /home/mkhare/sastaspace/infra/landing/out

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    outputs:
      built: ${{ steps.build.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - name: download bindings (from triggering module run)
        if: inputs.bindings_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: stdb-bindings
          path: packages/stdb-bindings/src/generated
          run-id: ${{ inputs.bindings_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: pnpm audit (prod deps only)
        run: pnpm audit --prod --audit-level moderate

      - name: typecheck
        run: pnpm --filter @sastaspace/landing typecheck

      - name: lint
        run: pnpm --filter @sastaspace/landing lint --max-warnings 0

      - name: test + coverage (vitest gates on threshold via vitest.config.ts)
        run: pnpm --filter @sastaspace/landing coverage

      - uses: actions/upload-artifact@v4
        with:
          name: landing-coverage
          path: apps/landing/coverage
          retention-days: 7

      - id: build
        name: build static export
        run: pnpm --filter @sastaspace/landing build

      - uses: actions/upload-artifact@v4
        with:
          name: landing-out
          path: apps/landing/out
          retention-days: 7

  deploy:
    needs: gate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with: { sparse-checkout: infra/landing }

      - uses: actions/download-artifact@v4
        with:
          name: landing-out
          path: out/

      - name: rsync site + sync nginx config (landing + notes share security_headers.conf)
        run: |
          mkdir -p "$LANDING_OUT_DIR"
          rsync -a --delete out/ "$LANDING_OUT_DIR/"

          # Both nginx containers bind-mount infra/landing/security_headers.conf
          # and infra/landing/nginx.conf as :ro from the host. We update those
          # in-place so a `nginx -s reload` picks them up. Without this, CSP /
          # nginx.conf changes in the repo never reach prod even though the
          # containers will happily reload the (unchanged) config.
          install -m 644 infra/landing/security_headers.conf \
            /home/mkhare/sastaspace/infra/landing/security_headers.conf
          install -m 644 infra/landing/nginx.conf \
            /home/mkhare/sastaspace/infra/landing/nginx.conf

          docker exec sastaspace-landing nginx -s reload
          # The notes container also includes security_headers.conf; reload it
          # too so any CSP / cache header change lands across both surfaces.
          docker exec sastaspace-notes nginx -s reload

      - name: smoke test
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://sastaspace.com/)
            echo "attempt $i: HTTP $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 4
          done
          exit 1
