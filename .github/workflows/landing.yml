name: landing

on:
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "packages/**"
      - "infra/landing/nginx.conf"
      - ".github/workflows/landing.yml"
  pull_request:
    paths:
      - "apps/landing/**"
      - "packages/**"
  workflow_dispatch:
    inputs:
      bindings_run_id:
        description: "module workflow run id whose bindings artifact to download (optional)"
        required: false
        type: string

concurrency:
  group: landing-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_STDB_URI: wss://stdb.sastaspace.com
  NEXT_PUBLIC_STDB_MODULE: sastaspace
  LANDING_OUT_DIR: /home/mkhare/sastaspace/infra/landing/out

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: download bindings (from triggering module run)
        if: inputs.bindings_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: stdb-bindings
          path: packages/stdb-bindings/src/generated
          run-id: ${{ inputs.bindings_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm --filter @sastaspace/landing typecheck
      - run: pnpm --filter @sastaspace/landing lint
      - run: pnpm --filter @sastaspace/landing build

      - name: deploy to nginx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p "$LANDING_OUT_DIR"
          rsync -a --delete apps/landing/out/ "$LANDING_OUT_DIR/"
          docker exec sastaspace-landing nginx -s reload

      - name: smoke test
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://sastaspace.com/)
            echo "attempt $i: HTTP $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 4
          done
          exit 1
