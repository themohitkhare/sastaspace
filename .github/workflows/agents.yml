name: agents

# Tests + builds + deploys for the Python services in infra/agents/.
# Runs on the self-hosted runner so docker build can write to taxila's
# socket directly + `docker compose up -d` lands the new image.

on:
  push:
    branches: [main]
    paths:
      - "infra/agents/**"
      - "infra/docker-compose.yml"
      - ".github/workflows/agents.yml"
  pull_request:
    paths:
      - "infra/agents/**"
  workflow_dispatch:

concurrency:
  group: agents-${{ github.ref }}
  cancel-in-progress: true

jobs:
  moderator:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: lint + test
        working-directory: infra/agents/moderator
        run: |
          # Reuse the venv between runs to skip pip install when nothing
          # changed in pyproject.toml. Self-hosted runners persist FS,
          # so this is just a directory cache.
          if [[ ! -d .venv ]] || [[ pyproject.toml -nt .venv/pyvenv.cfg ]]; then
            rm -rf .venv
            python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e '.[dev]'
          fi
          . .venv/bin/activate
          ruff check src tests
          pytest

      - name: build container
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: infra
        run: docker compose build moderator

      - name: deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: infra
        run: |
          # Refresh the .env if the SPACETIME_TOKEN secret has rotated
          # (no-op when unchanged — tokenStateChanges only on rotation).
          if [[ -n "$SPACETIME_TOKEN" ]]; then
            install -m 600 /dev/null agents/moderator/.env
            echo "SPACETIME_TOKEN=$SPACETIME_TOKEN" > agents/moderator/.env
          fi
          # --no-deps so we don't restart stdb just because moderator changed.
          # stdb's healthcheck takes ~20s on cold-start; touching it here would
          # force the deploy to wait that long for no reason.
          docker compose up -d --no-deps --force-recreate moderator
          sleep 6
          docker compose ps moderator
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}

      - name: smoke — moderator is polling
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: infra
        run: |
          # The moderator logs an HTTP request to /v1/database/.../sql every
          # POLL_SECONDS. If we see at least one in 10s, it's running cleanly.
          sleep 4
          if docker compose logs --tail=20 moderator 2>&1 | grep -q "POST.*sql.*200"; then
            echo "moderator is alive and polling"
          else
            echo "::error::moderator is not polling — recent logs:"
            docker compose logs --tail=30 moderator
            exit 1
          fi

  auth:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - name: lint + test
        working-directory: infra/agents/auth
        run: |
          if [[ ! -d .venv ]] || [[ pyproject.toml -nt .venv/pyvenv.cfg ]]; then
            rm -rf .venv
            python3.12 -m venv .venv
            . .venv/bin/activate
            pip install -q --upgrade pip
            pip install -q -e '.[dev]'
          fi
          . .venv/bin/activate
          ruff check src tests
          pytest

      - name: build container
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: infra
        run: docker compose build auth

      - name: deploy
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: infra
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
        run: |
          if [[ -z "$SPACETIME_TOKEN" || -z "$RESEND_API_KEY" ]]; then
            echo "::error::SPACETIME_TOKEN or RESEND_API_KEY missing"
            exit 1
          fi
          install -m 600 /dev/null agents/auth/.env
          {
            echo "SPACETIME_TOKEN=$SPACETIME_TOKEN"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
            echo "E2E_TEST_SECRET=$E2E_TEST_SECRET"
          } > agents/auth/.env
          docker compose up -d --no-deps --force-recreate auth
          sleep 6
          docker compose ps auth

      - name: smoke — /healthz responds
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:3130/healthz)
            echo "attempt $i: HTTP $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 3
          done
          docker compose -f infra/docker-compose.yml logs auth --tail=30
          exit 1
