name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  RUBY_VERSION: 3.3.0
  NODE_VERSION: '20'
  RAILS_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sastaspace_test
  REDIS_URL: redis://localhost:6379/0

jobs:
  # Code Quality and Linting
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Run RuboCop
      run: |
        bundle exec rubocop --parallel --format github
        
    - name: Run Brakeman security scan
      run: |
        bundle exec brakeman --exit-on-warn --no-progress --color
        
    - name: Check for vulnerable gems
      run: |
        bundle exec bundle audit --update

  # Test Suite
  test:
    name: Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastaspace_test
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        bundle install --jobs 4 --retry 3
        npm install
        
    - name: Setup database
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load
        
    - name: Precompile assets
      run: |
        bundle exec rails assets:precompile
        
    - name: Run tests with coverage
      run: |
        bundle exec rails test:all
      env:
        COVERAGE: true
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/coverage.xml
        flags: unittests
        name: sastaspace-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # Security Scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Set up Ruby for security checks
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Run bundler-audit
      run: |
        bundle exec bundler-audit --update
        
    - name: Run Brakeman and output SARIF
      run: |
        bundle exec brakeman --format sarif --output brakeman-results.sarif --no-exit-on-warn || true
        
    - name: Upload Brakeman SARIF results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'brakeman-results.sarif'

  # Performance Tests (optional)
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastaspace_test
        options: >
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
      redis:
        image: redis:7-alpine
        options: >
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        bundle install --jobs 4 --retry 3
        npm install
        
    - name: Setup database
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load
        
    - name: Run performance tests
      run: |
        # Add your performance test command here
        # Example: bundle exec rails test:performance
        echo "Performance tests would run here"

  # Notification on failure
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: failure()
    
    steps:
    - name: Notify team on failure
      run: |
        echo "CI Pipeline failed. Check the logs for details."
        # You can add Slack/Discord/Email notifications here