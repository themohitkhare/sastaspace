name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  RAILS_ENV: test
  RUBY_VERSION: 3.4.7
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_HOST: localhost
  DATABASE_PORT: 5432
  SIMPLECOV: 1

jobs:
  ci:
    name: CI Pipeline (Local-First)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastaspace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Install system dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libvips \
          postgresql-client
        
    - name: Install dependencies
      run: |
        bundle install --jobs 4 --retry 3
        
    - name: Setup database
      run: |
        bundle exec rails db:create
        bundle exec rails db:schema:load || bundle exec rails db:migrate
        
    - name: "Style: Ruby (RuboCop)"
      run: |
        bundle exec rubocop -A
        
    - name: "Security: Brakeman"
      run: |
        bundle exec brakeman -q -w2
        
    - name: "Security: Bundler Audit"
      run: |
        bundle exec bundle-audit check --update
        
    - name: "Tests: Rails with Coverage"
      run: |
        bundle exec rails test:full
        
    - name: "Tests: System"
      run: |
        bundle exec rails test:system || echo 'System tests skipped (no browser driver configured)'
        
    - name: "Coverage: Summary"
      if: success()
      run: |
        echo "Coverage report generated in coverage/ directory"
        if [ -f coverage/index.html ]; then
          echo "Coverage HTML report available"
        fi
        
    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7
