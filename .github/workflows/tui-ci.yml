name: tui-ci

on:
  push:
    paths:
      - "crates/**"
      - "modules/**"
      - "tests/e2e/**"
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/tui-ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "modules/**"
      - "tests/e2e/**"
      - "Cargo.toml"
  workflow_dispatch:

concurrency:
  group: tui-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: install audio system deps (rodio → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --exclude sastaspace-module --exclude typewars-module --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --exclude sastaspace-module --exclude typewars-module --exclude e2e
        env:
          RUST_BACKTRACE: 1

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2
      - name: install audio system deps (rodio → alsa-sys)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: install spacetime CLI
        run: |
          curl -sSf https://install.spacetimedb.com | bash -s -- --yes 2>/dev/null || \
            curl -sSf https://install.spacetimedb.com | bash -s
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/share/spacetime/bin" >> "$GITHUB_PATH"
      - name: install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: build shell binary
        run: cargo build -p shell
      - name: run e2e
        run: SPACETIME_PORT=3199 cargo test -p e2e
        env:
          RUST_BACKTRACE: 1
