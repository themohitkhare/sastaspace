name: Dependencies & Security

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'package.json'
      - 'package-lock.json'

env:
  RUBY_VERSION: 3.3.0
  NODE_VERSION: '20'

jobs:
  # Security audit for Ruby gems
  audit-gems:
    name: Audit Ruby Gems
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Install bundler-audit
      run: |
        gem install bundler-audit
        
    - name: Update vulnerability database
      run: |
        bundle audit --update
        
    - name: Run security audit
      run: |
        bundle audit --format json --output audit-results.json || true
        bundle audit
        
    - name: Upload audit results
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: gem-audit-results
        path: audit-results.json
        retention-days: 30

  # Security audit for NPM packages
  audit-npm:
    name: Audit NPM Packages
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Run npm audit
      run: |
        npm audit --json > npm-audit-results.json || true
        npm audit
        
    - name: Upload npm audit results
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: npm-audit-results
        path: npm-audit-results.json
        retention-days: 30

  # Check for outdated dependencies
  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Check outdated Ruby gems
      run: |
        bundle outdated --strict > outdated-gems.txt || true
        cat outdated-gems.txt
        
    - name: Check outdated NPM packages
      run: |
        npm outdated --json > outdated-npm.json || true
        npm outdated
        
    - name: Upload outdated dependencies report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: outdated-dependencies
        path: |
          outdated-gems.txt
          outdated-npm.json
        retention-days: 30

  # License compliance check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Install license_finder
      run: |
        gem install license_finder
        
    - name: Run license finder
      run: |
        license_finder --format json --save license-report.json
        license_finder
        
    - name: Upload license report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: license-report
        path: license-report.json
        retention-days: 30

  # Create issue for security vulnerabilities
  create-security-issue:
    name: Create Security Issue
    runs-on: ubuntu-latest
    needs: [audit-gems, audit-npm]
    if: failure()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download audit artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: '*-audit-results'
        merge-multiple: true
        
    - name: Create security issue
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let issueBody = `## ⚠️ Security Vulnerabilities Detected\n\n`;
          issueBody += `Automated security scan found vulnerabilities in dependencies.\n\n`;
          issueBody += `**Scan Date:** ${new Date().toISOString()}\n`;
          issueBody += `**Workflow:** [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})\n\n`;
          
          // Check for gem audit results
          if (fs.existsSync('audit-results.json')) {
            try {
              const gemAudit = JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
              if (gemAudit.results && gemAudit.results.length > 0) {
                issueBody += `### Ruby Gem Vulnerabilities\n\n`;
                gemAudit.results.forEach(vuln => {
                  issueBody += `- **${vuln.gem}** (${vuln.version}): ${vuln.advisory.title}\n`;
                  issueBody += `  - Severity: ${vuln.advisory.criticality}\n`;
                  issueBody += `  - URL: ${vuln.advisory.url}\n\n`;
                });
              }
            } catch (e) {
              console.log('Error parsing gem audit results:', e);
            }
          }
          
          // Check for npm audit results
          if (fs.existsSync('npm-audit-results.json')) {
            try {
              const npmAudit = JSON.parse(fs.readFileSync('npm-audit-results.json', 'utf8'));
              if (npmAudit.vulnerabilities && Object.keys(npmAudit.vulnerabilities).length > 0) {
                issueBody += `### NPM Package Vulnerabilities\n\n`;
                Object.entries(npmAudit.vulnerabilities).forEach(([pkg, vuln]) => {
                  issueBody += `- **${pkg}**: ${vuln.severity} severity\n`;
                  if (vuln.via && vuln.via.length > 0) {
                    vuln.via.forEach(v => {
                      if (typeof v === 'object') {
                        issueBody += `  - ${v.title} (${v.url})\n`;
                      }
                    });
                  }
                });
              }
            } catch (e) {
              console.log('Error parsing npm audit results:', e);
            }
          }
          
          issueBody += `\n## Next Steps\n\n`;
          issueBody += `1. Review the vulnerabilities listed above\n`;
          issueBody += `2. Update affected dependencies to secure versions\n`;
          issueBody += `3. Test the application after updates\n`;
          issueBody += `4. Close this issue once all vulnerabilities are resolved\n\n`;
          issueBody += `*This issue was created automatically by the Dependencies & Security workflow.*`;
          
          // Create the issue
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `⚠️ Security Vulnerabilities Detected - ${new Date().toISOString().split('T')[0]}`,
            body: issueBody,
            labels: ['security', 'dependencies', 'high-priority']
          });

  # Weekly dependency update PR
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * *' && github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Update Ruby dependencies
      run: |
        bundle update --conservative
        
    - name: Update NPM dependencies
      run: |
        npm update
        
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: '🔄 Automated Dependency Updates'
        body: |
          ## Automated Dependency Updates
          
          This PR contains automated updates to project dependencies.
          
          ### Changes
          - Updated Ruby gems to latest compatible versions
          - Updated NPM packages to latest compatible versions
          
          ### Testing
          Please ensure all tests pass before merging.
          
          *This PR was created automatically by the Dependencies & Security workflow.*
        branch: chore/update-dependencies
        delete-branch: true
        draft: false
        labels: |
          dependencies
          automated
          chore