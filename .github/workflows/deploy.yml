name: Deploy Project Bank

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, amd64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- landing (sastaspace.com) ---
      - name: Build landing image
        run: |
          docker build \
            -t localhost:32000/sastaspace-landing:latest \
            -t localhost:32000/sastaspace-landing:${{ github.sha }} \
            -f projects/landing/Dockerfile.web projects/landing/web

      - name: Push landing image
        run: |
          docker push localhost:32000/sastaspace-landing:latest
          docker push localhost:32000/sastaspace-landing:${{ github.sha }}

      # --- almirah (almirah.sastaspace.com) ---
      - name: Build almirah image
        run: |
          # NEXT_PUBLIC_* vars are baked into the client bundle at build time.
          # Source them from the cluster secret so they stay in sync without
          # duplicating into GitHub Actions config.
          SUPABASE_URL=$(sudo microk8s kubectl -n sastaspace get secret almirah-runtime -o jsonpath='{.data.NEXT_PUBLIC_SUPABASE_URL}' | base64 -d)
          SUPABASE_ANON_KEY=$(sudo microk8s kubectl -n sastaspace get secret almirah-runtime -o jsonpath='{.data.NEXT_PUBLIC_SUPABASE_ANON_KEY}' | base64 -d)
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            -t localhost:32000/sastaspace-almirah:latest \
            -t localhost:32000/sastaspace-almirah:${{ github.sha }} \
            -f projects/_template/Dockerfile.web projects/almirah/web

      - name: Push almirah image
        run: |
          docker push localhost:32000/sastaspace-almirah:latest
          docker push localhost:32000/sastaspace-almirah:${{ github.sha }}

      # --- apply shared + per-project manifests ---
      - name: Apply shared manifests
        run: |
          sudo microk8s kubectl apply -f infra/k8s/namespace.yaml
          sudo microk8s kubectl apply -f infra/k8s/ --recursive

      - name: Apply project manifests
        run: |
          shopt -s nullglob
          for manifest in projects/*/k8s.yaml; do
            echo "applying $manifest"
            sudo microk8s kubectl apply -f "$manifest"
          done

      - name: Rolling restart and rollout status
        run: |
          DEPLOYMENTS=$(sudo microk8s kubectl -n sastaspace get deploy -o name)
          if [ -n "$DEPLOYMENTS" ]; then
            echo "$DEPLOYMENTS" | xargs -n1 sudo microk8s kubectl -n sastaspace rollout restart
            echo "$DEPLOYMENTS" | xargs -n1 sudo microk8s kubectl -n sastaspace rollout status --timeout=300s
          fi
