name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  RUBY_VERSION: 3.3.0
  DOCKER_IMAGE_NAME: sastaspace
  REGISTRY: ghcr.io

jobs:
  # Build and push Docker image
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.DOCKER_IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # Deploy using Kamal
  deploy:
    name: Deploy with Kamal
    runs-on: ubuntu-latest
    needs: build
    environment: 
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.APP_URL }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Install Kamal
      run: |
        gem install kamal
        
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Configure Kamal secrets
      run: |
        mkdir -p ~/.config/kamal
        echo "${{ secrets.KAMAL_SECRETS }}" > ~/.config/kamal/secrets
      env:
        KAMAL_SECRETS: ${{ secrets.KAMAL_SECRETS }}
        
    - name: Deploy with Kamal
      run: |
        kamal deploy
      env:
        DOCKER_IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
        
    - name: Verify deployment
      run: |
        # Health check
        sleep 30
        curl -f ${{ vars.APP_URL }}/health || exit 1
        
    - name: Notify deployment success
      if: success()
      run: |
        echo "✅ Deployment to ${{ github.event.inputs.environment || 'production' }} successful!"
        # Add your notification logic here (Slack, Discord, etc.)
        
    - name: Rollback on failure
      if: failure()
      run: |
        echo "❌ Deployment failed, attempting rollback..."
        kamal rollback || echo "Rollback failed or not available"
        # Add your notification logic here

  # Database migrations (separate job for safety)
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: 
      name: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Install Kamal
      run: |
        gem install kamal
        
    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        
    - name: Run database migrations
      run: |
        kamal app exec 'bundle exec rails db:migrate'
      env:
        RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        
    - name: Notify migration status
      if: always()
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Database migrations completed successfully"
        else
          echo "❌ Database migrations failed"
        fi

  # Post-deployment tasks
  post-deploy:
    name: Post-Deployment Tasks
    runs-on: ubuntu-latest
    needs: [deploy, migrate]
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true
        
    - name: Warm up application cache
      run: |
        # Add cache warming commands here
        echo "Cache warming completed"
        
    - name: Run smoke tests
      run: |
        # Add smoke test commands here
        curl -f ${{ vars.APP_URL }}/health
        echo "Smoke tests passed"
        
    - name: Update deployment status
      run: |
        echo "🚀 Deployment completed successfully!"
        echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
        echo "Image: ${{ needs.build.outputs.image-tag }}"
        echo "Commit: ${{ github.sha }}"
        echo "URL: ${{ vars.APP_URL }}"