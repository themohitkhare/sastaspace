name: Deploy Project Bank

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, amd64]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build landing image
        run: |
          docker build \
            -t localhost:32000/sastaspace-landing-web:latest \
            -t localhost:32000/sastaspace-landing-web:${{ github.sha }} \
            -f projects/landing/Dockerfile.web projects/landing/web

      - name: Push landing image
        run: |
          docker push localhost:32000/sastaspace-landing-web:latest
          docker push localhost:32000/sastaspace-landing-web:${{ github.sha }}

      - name: Apply shared manifests
        run: |
          sudo microk8s kubectl apply -f infra/k8s/namespace.yaml
          sudo microk8s kubectl apply -f infra/k8s/ --recursive

      - name: Rolling restart and rollout status
        run: |
          DEPLOYMENTS=$(sudo microk8s kubectl get deploy -A -o name)
          if [ -n "$DEPLOYMENTS" ]; then
            echo "$DEPLOYMENTS" | xargs -n1 sudo microk8s kubectl rollout restart
            echo "$DEPLOYMENTS" | xargs -n1 sudo microk8s kubectl rollout status --timeout=300s
          fi
