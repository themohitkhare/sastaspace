name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  RAILS_ENV: production
  RUBY_VERSION: 3.4.7
  DATABASE_USERNAME: postgres
  DATABASE_PASSWORD: postgres
  DATABASE_HOST: localhost
  DATABASE_PORT: 5432

jobs:
  pre_deploy_checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastaspace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvips \
            postgresql-client
            
      - name: Setup database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load || bundle exec rails db:migrate
          
      - name: Run Pre-Deployment Checks
        run: |
          bundle exec rails deploy:pre_check
        env:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'test-secret-key-for-ci' }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sastaspace_test

  full_ci:
    name: Full CI Suite
    runs-on: ubuntu-latest
    needs: pre_deploy_checks
    
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sastaspace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libvips \
            postgresql-client
            
      - name: Install dependencies
        run: |
          bundle install --jobs 4 --retry 3
          
      - name: Setup database
        run: |
          bundle exec rails db:create
          bundle exec rails db:schema:load || bundle exec rails db:migrate
          
      - name: "Style: Ruby (RuboCop)"
        run: |
          bundle exec rubocop -A
          
      - name: "Security: Brakeman"
        run: |
          bundle exec brakeman -q -w2
          
      - name: "Security: Bundler Audit"
        run: |
          bundle exec bundle-audit check --update
          
      - name: "Tests: Rails with Coverage"
        run: |
          bundle exec rails test:full
          
      - name: "Tests: System"
        run: |
          bundle exec rails test:system || echo 'System tests skipped (no browser driver configured)'
          
      - name: "Coverage: Summary"
        if: success()
        run: |
          echo "Coverage report generated in coverage/ directory"
          if [ -f coverage/index.html ]; then
            echo "Coverage HTML report available"
          fi
          
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy:
    name: Deploy via Kamal
    runs-on: ubuntu-latest
    needs: [pre_deploy_checks, full_ci]
    if: success()
    environment:
      name: production
      url: https://sastaspace.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          
      - name: Install Kamal
        run: |
          gem install kamal
          
      - name: Deploy via Kamal
        run: |
          kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.DOCKER_TOKEN }}
          KAMAL_REGISTRY_USER: ${{ secrets.DOCKER_USERNAME }}
          
      - name: Post-Deployment Health Check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          
          # Health check endpoint
          curl -f https://sastaspace.com/up || exit 1
          echo "✅ Health check passed"
          
      - name: Notify on Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Deployment failed! Check logs."
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
