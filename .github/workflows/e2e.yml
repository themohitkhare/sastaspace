name: e2e

# End-to-end Playwright tests against live prod.
# Catches the class of bugs that unit tests can't see:
#  - stale builds deploying with old content
#  - CSP / hydration failures making JS-driven UI inert
#  - moderator pipeline regressions (post → approve roundtrip)
#  - magic-link auth flow end-to-end
#
# Runs on:
#  - every push to main (so a regression is caught at the commit that
#    introduces it, before the next change masks it)
#  - nightly cron at 04:00 UTC = 09:30 IST (catches drift: cert expiry,
#    moderator behaviour shift, schema migration breakage)
#  - manual workflow_dispatch

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "module/**"
      - "infra/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  # Don't run two e2e suites concurrently — they share the live stdb
  # state (the comment table). Cancel earlier runs in favour of the
  # latest commit so we always test current main.
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 15
    env:
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      # Use the existing root install — tests/e2e is in pnpm-workspace.yaml.
      - name: install workspace deps
        run: pnpm install --frozen-lockfile

      - name: install playwright browsers
        run: pnpm --filter @sastaspace/e2e exec playwright install chromium --with-deps

      - name: typecheck
        run: pnpm --filter @sastaspace/e2e exec tsc --noEmit

      - name: gate — required env present
        run: |
          if [[ -z "$E2E_TEST_SECRET" ]]; then
            echo "::error::E2E_TEST_SECRET must be set as a GH Actions secret. Without it the magic-link side door doesn't open and the auth specs can't run."
            exit 1
          fi

      - name: smoke — live prod URLs reachable
        run: |
          for url in https://sastaspace.com/ https://notes.sastaspace.com/ \
                     https://auth.sastaspace.com/healthz \
                     https://stdb.sastaspace.com/v1/ping; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" "$url")
            echo "  $url → $code"
            [[ "$code" == "200" ]] || { echo "::error::$url returned $code, refusing to run e2e on a broken stack"; exit 1; }
          done

      - name: run playwright
        run: pnpm --filter @sastaspace/e2e test
        env:
          CI: "1"

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: upload trace + video artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: tests/e2e/test-results/
          retention-days: 14
