name: notes

on:
  push:
    branches: [main]
    paths:
      - "apps/notes/**"
      - "packages/design-tokens/**"
      - "packages/stdb-bindings/**"
      - "infra/notes/nginx.conf"
      - "infra/landing/security_headers.conf"
      - ".github/workflows/notes.yml"
  pull_request:
    paths:
      - "apps/notes/**"
      - "packages/design-tokens/**"
      - "packages/stdb-bindings/**"
  workflow_dispatch:

concurrency:
  group: notes-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_STDB_URI: wss://stdb.sastaspace.com
  NEXT_PUBLIC_STDB_MODULE: sastaspace
  NOTES_OUT_DIR: /home/mkhare/sastaspace/infra/notes/out

jobs:
  gate:
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (prod deps only)
        run: pnpm audit --prod --audit-level moderate

      - run: pnpm --filter @sastaspace/notes typecheck
      - run: pnpm --filter @sastaspace/notes lint --max-warnings 0
      - run: pnpm --filter @sastaspace/notes coverage

      - uses: actions/upload-artifact@v4
        with:
          name: notes-coverage
          path: apps/notes/coverage
          retention-days: 7

      - run: pnpm --filter @sastaspace/notes build

      - name: deploy to nginx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p "$NOTES_OUT_DIR"
          rsync -a --delete apps/notes/out/ "$NOTES_OUT_DIR/"
          docker exec sastaspace-notes nginx -s reload

      - name: smoke test
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://notes.sastaspace.com/)
            echo "attempt $i: HTTP $code"
            [[ "$code" == "200" ]] && exit 0
            sleep 4
          done
          exit 1

  moderator-tests:
    runs-on: [self-hosted, Linux]
    if: contains(github.event.head_commit.modified, 'infra/agents/moderator/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: install python + run pytest
        working-directory: infra/agents/moderator
        run: |
          python3.12 -m venv .venv
          . .venv/bin/activate
          pip install -q --upgrade pip
          pip install -q -e '.[dev]'
          pytest
