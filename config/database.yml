# PostgreSQL with pgvector extension
#   gem install pg
#
#   Ensure the PostgreSQL gem is defined in your Gemfile
#   gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch('DATABASE_USERNAME', 'sastaspace_admin') %>
  password: <%= ENV.fetch('DATABASE_PASSWORD', 'SastaSpace2024!VectorDB') %>
  host: <%= ENV.fetch('DATABASE_HOST', 'localhost') %>
  port: <%= ENV.fetch('DATABASE_PORT', '5432') %>

development:
  <<: *default
  database: sastaspace_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: sastaspace_test

# Store production database configuration via DATABASE_URL
production:
  primary:
    <<: *default
    database: sastaspace_production
    url: <%= ENV['DATABASE_URL'] %>
  cache:
    <<: *default
    database: sastaspace_production_cache
    url: <%= ENV['DATABASE_URL'] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: sastaspace_production_queue
    url: <%= ENV['DATABASE_URL'] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: sastaspace_production_cable
    url: <%= ENV['DATABASE_URL'] %>
    migrations_paths: db/cable_migrate
