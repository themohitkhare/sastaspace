default: &default
  url: <%= ENV.fetch("REDIS_URL", "redis://127.0.0.1:6379/0") %>
  namespace: sastaspace:jobs:<%= Rails.env %>
  pool_size: 5
  pool_timeout: 5
  reconnect_attempts: 3
  reconnect_delay: 0.5
  reconnect_delay_max: 2.0

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
