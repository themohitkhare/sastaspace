# Cloudflare Zero Trust tunnel configuration
#
# Runs as a systemd service on the host (not in k8s).
# All hostnames route through localhost:80 (MicroK8s nginx ingress controller),
# which handles host-based routing to the correct namespace/service.
#
# Install: sudo cloudflared service install <TUNNEL_TOKEN>
# Status:  sudo systemctl status cloudflared
# Logs:    sudo journalctl -u cloudflared -f

tunnel: b3d36ee8-8bd2-4289-83a0-bf2ab53aa3b8
credentials-file: /home/mkhare/.cloudflared/b3d36ee8-8bd2-4289-83a0-bf2ab53aa3b8.json

ingress:
  - hostname: api.sastaspace.com
    service: http://localhost:80
  - hostname: sastaspace.com
    service: http://localhost:80
  - hostname: www.sastaspace.com
    service: http://localhost:80
  - hostname: tasks.sastaspace.com
    service: http://localhost:80
  - hostname: monitor.sastaspace.com
    service: http://localhost:80
  - service: http_status:404
