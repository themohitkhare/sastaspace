# Tiny supabase-compatible gateway.
#
# The browser / supabase-js expects one base URL from which it can reach both
# gotrue (prefixed /auth/v1) and postgrest (prefixed /rest/v1). Full Supabase
# uses Kong for this; for a single-dev self-host an nginx with two locations
# does the same job and adds CORS.

map $http_origin $cors_origin {
  default                       "";
  "~^https?://localhost(:\d+)?$"      $http_origin;
  "~^https?://127\.0\.0\.1(:\d+)?$"   $http_origin;
  "~^https?://192\.168\.\d+\.\d+(:\d+)?$" $http_origin;
  "~^https?://([a-z0-9-]+\.)?sastaspace\.com$" $http_origin;
}

server {
  listen 8000;
  server_name _;

  # Generous but not unbounded.
  client_max_body_size 2m;
  proxy_read_timeout 60s;
  proxy_connect_timeout 5s;

  # --- CORS --------------------------------------------------------------
  # Browsers hitting /auth/v1 and /rest/v1 from the landing app need these.
  add_header Access-Control-Allow-Origin      $cors_origin      always;
  add_header Access-Control-Allow-Credentials "true"            always;
  add_header Access-Control-Allow-Headers     "authorization, x-client-info, apikey, content-type, prefer, x-upsert, x-supabase-api-version, range" always;
  add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Expose-Headers    "content-range, x-supabase-api-version" always;
  add_header Vary                             "Origin"          always;

  # --- health ------------------------------------------------------------
  location = /healthz {
    default_type application/json;
    return 200 '{"status":"ok","gateway":"sastaspace-nginx"}';
  }

  # --- GoTrue ------------------------------------------------------------
  # supabase-js calls /auth/v1/<path>; strip the prefix and forward to gotrue.
  # GoTrue emits its own Access-Control-Allow-* headers; hide them so the
  # server-level add_header values are the sole source of truth (browsers
  # reject duplicate ACAO).
  location /auth/v1/ {
    if ($request_method = OPTIONS) { return 204; }
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_pass http://gotrue:9999/;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
  }

  # Mirror Supabase's Kong behaviour: GoTrue's mailer emits BARE-path links
  # (e.g. /verify?token=..., /callback for OAuth) regardless of whether
  # API_EXTERNAL_URL includes a path, so we must route those paths to gotrue
  # too. Without this, confirmation emails produce a 404 at nginx.
  location ~ ^/(verify|callback|authorize|otp|magiclink|recover|sso|invite)(/.*)?$ {
    if ($request_method = OPTIONS) { return 204; }
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_pass http://gotrue:9999$request_uri;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
  }

  # --- PostgREST ---------------------------------------------------------
  location /rest/v1/ {
    if ($request_method = OPTIONS) { return 204; }
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_pass http://postgrest:3000/;
    proxy_set_header Host              $host;
    proxy_set_header Authorization     $http_authorization;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
  }

  # --- pg-meta (backend for Studio; don't expose publicly in prod) -------
  location /pg/ {
    if ($request_method = OPTIONS) { return 204; }
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_pass http://pg-meta:8080/;
    proxy_set_header Host $host;
  }
}
