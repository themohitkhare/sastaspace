# Admin-specific security headers.
# Differs from landing/security_headers.conf in three ways to support
# Google Identity Services (Sign In With Google):
#   1. script-src includes accounts.google.com (GIS loader script)
#   2. frame-src includes accounts.google.com (GIS renders the button as an iframe)
#   3. connect-src includes accounts.google.com + oauth2.googleapis.com
#   4. Cross-Origin-Opener-Policy is same-origin-allow-popups so the GIS
#      popup can postMessage the credential back to this page.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.googleusercontent.com; font-src 'self' data:; frame-src https://accounts.google.com; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://cloudflareinsights.com https://stdb.sastaspace.com wss://stdb.sastaspace.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
