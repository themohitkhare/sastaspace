# Cluster ingress — assumes:
#   • cloudflared (systemd on host) routes sastaspace.com, www.sastaspace.com,
#     api.sastaspace.com to http://localhost:80 on the node.
#   • microk8s ingress-nginx listens on the host's :80 via the public
#     ingressClass ("public").
#   • Cloudflare terminates TLS at the edge, so ssl-redirect is OFF here.
#
# Routing (post Rails migration, design-log 006):
#   sastaspace.com/          → landing-rails (Rails 8)
#   sastaspace.com/almirah/* → almirah-rails (Rails 8, routes scoped to /almirah)
#   www.sastaspace.com       → landing-rails
#   api.sastaspace.com       → gateway (nginx → gotrue/postgrest)
#
# IMPORTANT: with pathType: Prefix, the /almirah rule must appear *before*
# the / rule inside the same host block. Microk8s ingress-nginx evaluates
# rules in declaration order when multiple would match, so the more
# specific prefix has to come first or every /almirah request ends up at
# landing-rails.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: landing-ingress
  namespace: sastaspace
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: public
  rules:
    - host: sastaspace.com
      http:
        paths:
          - path: /almirah
            pathType: Prefix
            backend:
              service:
                name: almirah-rails
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing-rails
                port:
                  number: 3000
    - host: www.sastaspace.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: landing-rails
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: sastaspace
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # Gateway owns CORS. Don't let nginx-ingress add or rewrite them.
    nginx.ingress.kubernetes.io/enable-cors: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  ingressClassName: public
  rules:
    - host: api.sastaspace.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
