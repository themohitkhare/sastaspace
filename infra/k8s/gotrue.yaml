apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotrue
  namespace: sastaspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotrue
  template:
    metadata:
      labels:
        app: gotrue
    spec:
      containers:
        - name: gotrue
          image: supabase/gotrue:v2.188.1
          ports:
            - containerPort: 9999
          envFrom:
            - secretRef:
                name: gotrue-config
          env:
            - name: GOTRUE_API_HOST
              value: "0.0.0.0"
            - name: GOTRUE_API_PORT
              value: "9999"
            - name: GOTRUE_DB_DRIVER
              value: "postgres"
            - name: GOTRUE_JWT_EXP
              value: "3600"
            - name: GOTRUE_JWT_DEFAULT_GROUP_NAME
              value: "authenticated"
            - name: GOTRUE_JWT_ADMIN_ROLES
              value: "service_role"
            - name: GOTRUE_JWT_AUD
              value: "authenticated"
        - name: GOTRUE_EXTERNAL_EMAIL_ENABLED
          value: "true"
        - name: API_EXTERNAL_URL
          value: "https://auth.sastaspace.com"
          readinessProbe:
            httpGet:
              path: /health
              port: 9999
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gotrue
  namespace: sastaspace
spec:
  selector:
    app: gotrue
  ports:
    - port: 9999
      targetPort: 9999
