# Shared security header set, included from every nginx location that
# adds any header (nginx replaces inherited add_header sets entirely
# when a child block has its own add_header directive).

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
# CSP: 'unsafe-inline' on script-src is required for Next.js's RSC data
# stream (the inline `self.__next_f.push(...)` scripts that hydrate
# Server Components state). Without it, React never hydrates and
# nothing interactive works (the AuthMenu sign-in button just renders
# as static HTML with no click handler).
#
# We *could* nonce the inline scripts via Next middleware, but middleware
# isn't available in `output: 'export'` mode. The remaining defenses
# (script-src 'self', frame-ancestors 'none', base-uri 'self', no eval)
# still cover the major XSS vectors for a static site like ours.
#
# connect-src includes both stdb and the auth service.
#
# stdb needs BOTH protocols:
#   - wss://stdb.sastaspace.com — the actual realtime websocket (anon read).
#   - https://stdb.sastaspace.com — the SDK's `withToken(jwt)` flow does a
#     HTTPS fetch to /v1/identity/websocket-token to exchange the user JWT
#     for a short-lived websocket token before opening the WS. Without it,
#     signed-in comment submit and the owner admin queue both die with
#     "Failed to fetch" / CSP violation logged to the page console (the
#     anon/read flow keeps working since it never hits the HTTPS endpoint).
# 'unsafe-eval' is required by the SpacetimeDB JS SDK 2.1 — it uses
# dynamic Function/eval internally for schema-driven row parsing. Without
# it, every reducer call (submitComment, etc) silently fails with a CSP
# violation logged to the page. Discovered via E2E: clicking "post
# comment" did nothing in headless chromium because the SDK's eval was
# blocked. The page is a static export with no user-rendered HTML, so
# the practical XSS surface is small even with unsafe-eval allowed.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss://stdb.sastaspace.com https://stdb.sastaspace.com https://auth.sastaspace.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
