# auth.sastaspace.com — deprecation tombstone (Phase 3 → Phase 4 transition).
#
# The FastAPI auth service (services/auth/) was retired in Phase 3 of the
# SpacetimeDB-native rewire (see docs/audits/2026-04-26-stdb-native-rewire-risk-audit.md
# § N11). Magic-link issuance and verification now live as STDB reducers
# (request_magic_link / verify_token in modules/sastaspace/src/lib.rs) and the
# transactional email is sent by the workers' auth-mailer agent. There is no
# longer any HTTP API at this hostname.
#
# This server block returns 410 Gone (per RFC 9110 §15.5.11 — "the target
# resource is no longer available at the origin server and ... this condition
# is likely to be permanent") for every path. We keep the ingress alive for
# at least 7 days post-cutover so any cached frontend bundle pointing at
# auth.sastaspace.com surfaces a clear, actionable error instead of a TCP
# timeout / DNS NXDOMAIN. After that window, infra/cloudflared/remove-auth-ingress.sh
# drops the tunnel route and this container can be torn down (Phase 4).

server {
  listen 80 default_server;
  server_name _;

  # Tombstone-friendly headers. 410 is a terminal status — Retry-After: 0
  # tells well-behaved clients there's nothing to wait for, this is not a
  # transient outage.
  add_header Retry-After "0" always;
  add_header Cache-Control "no-store" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  # Tiny inlined HTML body — small enough to fit in nginx's 8K return-string
  # limit comfortably, no external assets needed. Plain text would also work
  # but Cloudflare's HTML-error-page injection sometimes overrides text/plain
  # 4xx/5xx responses, so we serve our own HTML.
  location / {
    default_type text/html;
    return 410 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>410 Gone — auth.sastaspace.com retired</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{height:100%;margin:0;background:#0b0b0d;color:#e6e6ea;font:16px/1.5 system-ui,-apple-system,sans-serif}main{max-width:560px;margin:10vh auto;padding:0 20px}h1{font-size:24px;margin:0 0 8px;font-weight:600}h1 small{color:#9aa0a6;font-weight:400;font-size:14px;margin-left:8px}p{margin:0 0 12px;color:#cfd2d6}code{background:#191a1f;padding:2px 6px;border-radius:4px;color:#f0f0f4;font-size:13px}a{color:#7ab7ff}</style></head><body><main><h1>auth.sastaspace.com retired <small>HTTP 410 Gone</small></h1><p>The dedicated magic-link auth service has been retired. Sign-in now runs directly against SpacetimeDB at <code>stdb.sastaspace.com</code> via the <code>request_magic_link</code> and <code>verify_token</code> reducers.</p><p>If you reached this page from a stale browser tab or bookmark, please return to <a href="https://sastaspace.com/">sastaspace.com</a> and sign in again — the in-page modal targets the new flow automatically.</p></main></body></html>';
  }
}
