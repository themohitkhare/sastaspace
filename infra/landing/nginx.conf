# nginx is annoying about add_header inheritance: a `location` that adds *any*
# header replaces the entire add_header set inherited from the parent. We
# work around it with an include file that defines the full security set,
# then include it in every block that adds anything.
# (Phase 3: re-touched to trigger landing deploy — the previous touch was
# masked because change-detector uses HEAD~1 HEAD diff, which only sees the
# topmost commit of a multi-commit push.)

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Default headers for all responses
  include /etc/nginx/conf.d/security_headers.conf;

  # Routing
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # Hashed assets — far-future cache
  location /_next/static/ {
    include /etc/nginx/conf.d/security_headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  # HTML — short cache, must revalidate
  location ~* \.html$ {
    include /etc/nginx/conf.d/security_headers.conf;
    expires 5m;
    add_header Cache-Control "public, must-revalidate" always;
  }

  # Block hidden files (.env, .git, .DS_Store, AppleDouble ._foo) + Next sidecars
  location ~ /\. { deny all; }
  location ~ /__next\. { deny all; }

  error_page 404 /404.html;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
