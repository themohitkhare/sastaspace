# deck.sastaspace.com — static file server for generated MusicGen zips.
#
# The workers process (`workers/src/agents/deck-agent.ts`) writes finished
# bundles to `/app/deck-out/<job_id>.zip` (host bind: `infra/deck-out/`).
# This nginx serves that directory read-only at https://deck.sastaspace.com/<job_id>.zip,
# matching the URL the deck-agent reports back to the `generate_request`
# row via `set_generate_done(...)` (see workers/src/shared/env.ts:16
# DECK_PUBLIC_BASE_URL).
#
# No API surface — only file fetches. Browsers reach this via a direct
# `<a href>` from /lab/deck on landing.sastaspace.com (and any future
# promoted route), so we permit cross-origin GET on the zip files.

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;

  # Default headers for all responses
  include /etc/nginx/conf.d/security_headers.conf;

  # Friendly landing page on bare host (replaces the empty "Index of /" the
  # auto-indexed empty directory used to render). Real users only reach
  # /<job_id>.zip via download links from sastaspace.com/lab/deck.
  location = / {
    add_header Content-Type "text/html; charset=utf-8";
    return 200 '<!doctype html><meta charset=utf-8><title>deck — sastaspace</title><meta name=viewport content="width=device-width,initial-scale=1"><style>body{font-family:system-ui,sans-serif;max-width:520px;margin:80px auto;padding:0 20px;color:#1a1917;line-height:1.5}a{color:#8a3d14}</style><h1>deck</h1><p>This is the audio-bundle file server for deck. There is no UI here.</p><p>To make a bundle, visit <a href="https://sastaspace.com/lab/deck">sastaspace.com/lab/deck</a>. Once a generation completes, the resulting <code>&lt;job-id&gt;.zip</code> is served directly from this host.</p>';
  }

  # Auto-index off everywhere else; users reach individual files via direct
  # /<job_id>.zip URLs surfaced from the deck UI.
  location / {
    autoindex off;
  }

  # Long-TTL cache for the zips: the file name is a UUID job_id, the bytes
  # never change for a given id, and re-renders produce a NEW id. Safe to
  # cache forever at the edge + browser.
  location ~* \.zip$ {
    include /etc/nginx/conf.d/security_headers.conf;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    # Allow cross-origin GET so /lab/deck on sastaspace.com can fetch via JS
    # if it ever switches from a plain <a download>. Headers stay restrictive.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Max-Age "86400" always;
    types { application/zip zip; }
    default_type application/zip;
  }

  # Block hidden files (.env, .git, .DS_Store, AppleDouble ._foo)
  location ~ /\. { deny all; }

  gzip on;
  # Don't gzip zips (already compressed). text/html is already in
  # nginx's default gzip_types, so we skip it (avoids dup-MIME warning).
  gzip_types text/css application/javascript application/json image/svg+xml;
}
