# SpacetimeDB self-host compose for sastaspace prod.
#
# Run on the prod box. Cloudflare Tunnel points stdb.sastaspace.com → localhost:3100.
# JWT keypair must exist in ./keys/ before first start (run ./keygen.sh once).

services:
  # Static landing — apps/landing/out is rsynced from CI (or local) into ./landing/out.
  # Cloudflare Tunnel routes sastaspace.com + www → 127.0.0.1:3110.
  landing:
    image: nginx:1.29-alpine
    container_name: sastaspace-landing
    restart: unless-stopped
    ports:
      - "127.0.0.1:3110:80"
    volumes:
      - ./landing/out:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    # Image already runs as user `spacetime` (uid 1000 inside container).
    # Bind mounts ./data and ./keys must be owned/readable by uid 1000 on host.
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      # loopback only — cloudflared reaches it via host network
      - "127.0.0.1:3100:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
