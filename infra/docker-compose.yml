services:
  # Static landing — apps/landing/out is rsynced from CI (or local) into ./landing/out.
  # Cloudflare Tunnel routes sastaspace.com + www → 127.0.0.1:3110.
  landing:
    image: nginx:1.29-alpine
    container_name: sastaspace-landing
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3110:80"
    volumes:
      - ./landing/out:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Static notes site — apps/notes/out → ./notes/out via rsync from CI.
  # Cloudflare Tunnel routes notes.sastaspace.com → 127.0.0.1:3120.
  notes:
    image: nginx:1.29-alpine
    container_name: sastaspace-notes
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3120:80"
    volumes:
      - ./notes/out:/usr/share/nginx/html:ro
      - ./notes/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Admin panel — apps/admin/out → ./admin/out via rsync from CI.
  # Cloudflare Tunnel routes admin.sastaspace.com → 127.0.0.1:3150.
  admin:
    image: nginx:1.29-alpine
    container_name: sastaspace-admin
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3150:80"
    volumes:
      - ./admin/out:/usr/share/nginx/html:ro
      - ./admin/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # TypeWars game UI — apps/typewars/out → ./typewars/out via rsync from CI.
  # Cloudflare Tunnel routes typewars.sastaspace.com → 127.0.0.1:3140.
  typewars:
    image: nginx:1.29-alpine
    container_name: sastaspace-typewars
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3140:80"
    volumes:
      - ./typewars/out:/usr/share/nginx/html:ro
      - ./typewars/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Static file server for MusicGen zips produced by the workers' deck-agent.
  # Workers write to ./deck-out/<job_id>.zip (host bind via the workers
  # service, line ~288). This container serves that same directory read-only
  # at https://deck.sastaspace.com/<job_id>.zip. The deck-agent reports the
  # public URL back to STDB (see workers/src/shared/env.ts DECK_PUBLIC_BASE_URL).
  # Cloudflare Tunnel routes deck.sastaspace.com → 127.0.0.1:3160. Note the
  # port 3160 is the same one the now-deprecated Python `deck` FastAPI used,
  # so the two CANNOT coexist on the same host.
  #
  # Profile gating: this service ships under profile `stdb-native`. The
  # legacy Python `deck` container above ships under the default profile.
  # Phase 3 cutover removes `deck` from the active set and brings up
  # `deck-static`:
  #     docker compose --profile stdb-native up -d deck-static
  #     docker compose stop deck && docker compose rm -f deck
  # Phase 4 deletes the Python service entry from this file.
  deck-static:
    profiles: ["stdb-native"]
    image: nginx:1.29-alpine
    container_name: sastaspace-deck-static
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3160:80"
    volumes:
      - ./deck-out:/usr/share/nginx/html:ro
      - ./deck/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Tombstone for the retired magic-link auth service (Phase 3 → 4 transition).
  # Cloudflare Tunnel routes auth.sastaspace.com → 127.0.0.1:3170 (the same
  # port the now-deprecated admin-api FastAPI used; freed by the rewire).
  # Returns 410 Gone for every path with a friendly HTML body. Lives under
  # the `stdb-native` profile so it stays out of the active set until the
  # cutover (which simultaneously stops the legacy `auth` and `admin-api`
  # containers — both 3130 and 3170 are then free).
  #
  # Phase 4 (≥7 days post-cutover) runs cloudflared/remove-auth-ingress.sh
  # to drop the tunnel rule, then this container can be torn down too.
  auth-410:
    profiles: ["stdb-native"]
    image: nginx:1.29-alpine
    container_name: sastaspace-auth-410
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 50
    mem_limit: 64m
    ports:
      - "127.0.0.1:3170:80"
    volumes:
      - ./landing/auth-410.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # 410 is the expected status — wget exits non-zero, so check via
      # HTTP HEAD with curl-style status grep.
      test: ["CMD-SHELL", "wget -qO- --server-response http://127.0.0.1/ 2>&1 | grep -q '410 Gone'"]
      interval: 30s
      timeout: 5s
      retries: 3

  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    environment:
      - HOME=/home/spacetime
    tmpfs:
      - /tmp
      - /home/spacetime:uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Magic-link auth FastAPI service. Tunnel routes auth.sastaspace.com →
  # 127.0.0.1:3130. Needs SPACETIME_TOKEN + RESEND_API_KEY in
  # ../services/auth/.env on the host (gitignored).
  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    image: sastaspace-auth:local
    container_name: sastaspace-auth
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 256m
    user: "1000:1000"
    network_mode: host  # so 127.0.0.1:3100 (stdb) reaches the host loopback
    env_file:
      - ../services/auth/.env
    environment:
      - PORT=3130  # bind directly on the host's loopback at the public-facing port
      - STDB_HTTP_URL=http://127.0.0.1:3100
      - STDB_MODULE=sastaspace
      - PUBLIC_BASE=https://auth.sastaspace.com
      - NOTES_CALLBACK=https://notes.sastaspace.com/auth/callback
      - ADMIN_CALLBACK=https://admin.sastaspace.com/auth/callback
      - TYPEWARS_CALLBACK=https://typewars.sastaspace.com/auth/callback
      - TYPEWARS_MODULE=typewars
      - ALLOWED_ORIGINS=https://sastaspace.com,https://www.sastaspace.com,https://notes.sastaspace.com,https://admin.sastaspace.com,https://typewars.sastaspace.com

  # Audio designer ("deck"): FastAPI + Agno + Ollama. Drafts a per-project
  # track plan via Ollama (gemma3:1b on host loopback) and renders WAVs into
  # a downloadable zip. Tunnel routes deck.sastaspace.com → 127.0.0.1:3160.
  # MusicGen integration is opt-in via the [musicgen] extra; the default
  # placeholder renderer (numpy sine voices) keeps mem under 256m.
  deck:
    build:
      context: ../services/deck
      dockerfile: Dockerfile
    image: sastaspace-deck:local
    container_name: sastaspace-deck
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 256m
    user: "1000:1000"
    network_mode: host  # so :11434 (ollama) reaches the host loopback
    environment:
      - PORT=3160
      - OLLAMA_URL=http://127.0.0.1:11434
      - OLLAMA_MODEL=gemma3:1b
      - PREFER_MUSICGEN=0
      - ALLOWED_ORIGINS=https://sastaspace.com,https://www.sastaspace.com,https://deck.sastaspace.com

  # Admin API: system metrics, container status, SSE logs, STDB write proxy.
  # Cloudflare Tunnel routes api.sastaspace.com → 127.0.0.1:3170.
  # Needs SPACETIME_TOKEN + GOOGLE_CLIENT_ID + OWNER_EMAIL in
  # ../services/admin-api/.env on the host (gitignored).
  admin-api:
    build:
      context: ../services/admin-api
      dockerfile: Dockerfile
    image: sastaspace-admin-api:local
    container_name: sastaspace-admin-api
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 256m
    user: "1000:1000"
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ../services/admin-api/.env
    environment:
      - PORT=3170
      - STDB_HTTP_URL=http://127.0.0.1:3100
      - STDB_MODULE=sastaspace
      - ALLOWED_ORIGINS=https://admin.sastaspace.com
    depends_on:
      spacetime:
        condition: service_healthy

  # Comment moderator: Agno + Ollama. Polls SpacetimeDB on the host loopback,
  # calls Ollama on the host loopback. Needs SPACETIME_TOKEN in
  # ./agents/moderator/.env on the host (gitignored).
  moderator:
    build:
      context: ./agents/moderator
      dockerfile: Dockerfile
    image: sastaspace-moderator:local
    container_name: sastaspace-moderator
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host  # so 127.0.0.1:3100 (stdb) and :11434 (ollama) work
    env_file:
      - ./agents/moderator/.env
    environment:
      - STDB_HTTP_URL=http://127.0.0.1:3100
      - STDB_MODULE=sastaspace
      - OLLAMA_HOST=http://127.0.0.1:11434
      - MODERATOR_MODEL=gemma3:1b
      - AGNO_TELEMETRY=false
      - POLL_SECONDS=3
    depends_on:
      spacetime:
        condition: service_healthy

  # Mastra workers process. Single Node container running multiple agents
  # behind per-agent feature flags (default off — boots and idles).
  # Phase 1 workstreams flesh out each agent and the shared STDB connection.
  #
  # Build context is the repo root (..) so the Dockerfile can `pnpm deploy
  # --filter @sastaspace/workers --prod` from a self-contained workspace tree
  # with the lockfile resolved (audit N8 — replaces the older
  # --no-frozen-lockfile workaround).
  workers:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    image: sastaspace-workers:local
    container_name: sastaspace-workers
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deck-out:/app/deck-out:rw
    env_file:
      - ../workers/.env
    environment:
      # Phase 3 cutover: use HTTPS endpoint (cloudflared) instead of local
      # 127.0.0.1:3100. Local endpoint's /v1/identity/websocket-token rejects
      # JWTs that the HTTPS endpoint accepts — different validation paths.
      # The cloudflared overhead is ~10ms per call, fine for the agent loop.
      - STDB_URL=https://stdb.sastaspace.com
      - STDB_MODULE=sastaspace
      # STDB_TOKEN is supplied via ../workers/.env (env_file above). Do NOT
      # set a placeholder here: docker compose's `environment:` overrides
      # `env_file:` for the same key, which silently shadows the real token
      # and breaks STDB auth at boot.
      - OLLAMA_URL=http://127.0.0.1:11434
      - LOCALAI_URL=http://127.0.0.1:8080
      # PHASE 3 CUTOVER: all four worker agents enabled. Each agent subscribes
      # to its own STDB intent table (pending_email / system_metrics / plan_request
      # / comment) and processes rows reactively. The legacy Python services
      # (auth, admin-api, deck, moderator) are stopped by the cutover commit
      # to free their respective ports. Revert: flip these back to false +
      # docker compose start <legacy-service>.
      - WORKER_AUTH_MAILER_ENABLED=true
      - WORKER_ADMIN_COLLECTOR_ENABLED=true
      - WORKER_DECK_AGENT_ENABLED=true
      - WORKER_MODERATOR_AGENT_ENABLED=true
    depends_on:
      spacetime:
        condition: service_healthy
    healthcheck:
      # Workers don't expose an HTTP port. Check that the node process is
      # still alive via pgrep. A crashed-after-boot container would show
      # Running=true in `docker compose ps` without this check (audit H4).
      test: ["CMD-SHELL", "pgrep -f 'node.*workers' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # LocalAI: self-hosted OpenAI-compatible model server. Sibling to Ollama.
  # Hosts the MusicGen audio model used by Phase 1 W3 deck-agent.
  # Dev (this file): CPU image (`localai/localai:latest`) — no GPU mounts.
  # Prod (taxila): swap image to AIO-GPU variant (`localai/localai:latest-aio-gpu-hipblas`
  # for AMD 7900 XTX, or `latest-aio-gpu-nvidia-cuda-12` for NVIDIA) and add the
  # corresponding `devices:` mounts. The AIO images bundle MusicGen; the slim
  # default image does NOT — see infra/localai/README.md "Phase 1 W3 status".
  localai:
    image: localai/localai:latest
    container_name: sastaspace-localai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # ./localai/models contains models.yaml (copied at infra setup time —
      # see infra/localai/README.md). Mounting the whole dir avoids the
      # nested-mount issue Docker has when a file mount sits inside another
      # bind mount of its parent dir.
      - ./localai/models:/models
    environment:
      - MODELS_PATH=/models
      - DEBUG=false
    mem_limit: 16g  # MusicGen needs headroom; adjust per host's RAM
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
