services:
  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    environment:
      - HOME=/home/spacetime
    tmpfs:
      - /tmp
      - /home/spacetime:uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # TS workers — multiple STDB-side agents in one Node container behind
  # per-agent feature flags. Currently enabled: deck-agent. Other agents
  # (auth-mailer, admin-collector, moderator-agent) flip to true via env.
  workers:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    image: sastaspace-workers:local
    container_name: sastaspace-workers
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ../workers/.env
    environment:
      - STDB_URL=https://stdb.sastaspace.com
      - STDB_MODULE=sastaspace
      - OLLAMA_URL=http://127.0.0.1:11434
      - LOCALAI_URL=http://127.0.0.1:8080
      - DECK_AUDIO_BACKEND=acestep
      - ACESTEP_URL=http://127.0.0.1:8001
      - WORKER_AUTH_MAILER_ENABLED=false
      - WORKER_ADMIN_COLLECTOR_ENABLED=false
      - WORKER_DECK_AGENT_ENABLED=true
      - WORKER_MODERATOR_AGENT_ENABLED=false
    depends_on:
      spacetime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*workers' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # LocalAI: self-hosted OpenAI-compatible model server (deck-agent fallback).
  # Image + device mounts target taxila (AMD 7900 XTX / ROCm). On Mac dev this
  # won't start (no /dev/kfd); use a docker-compose.override.yml to disable.
  localai:
    image: localai/localai:latest-aio-gpu-hipblas
    container_name: sastaspace-localai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"     # video
      - "993"    # render
    volumes:
      - ./localai/models:/models
    environment:
      - MODELS_PATH=/models
      - DEBUG=false
    mem_limit: 16g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
