services:
  # Static landing — apps/landing/out is rsynced from CI (or local) into ./landing/out.
  # Cloudflare Tunnel routes sastaspace.com + www → 127.0.0.1:3110.
  landing:
    image: nginx:1.29-alpine
    container_name: sastaspace-landing
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3110:80"
    volumes:
      - ./landing/out:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    # Match host uid that owns ./data and ./keys (mkhare on taxila).
    user: "1000:1000"
    read_only: true
    # /home — spacetimedb-standalone writes a CLI config file under $HOME on
    # boot, so we redirect HOME to a writable tmpfs.
    # /tmp — generic scratch space.
    environment:
      - HOME=/home/spacetime
    tmpfs:
      - /tmp
      - /home/spacetime:uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
