# SpacetimeDB self-host compose for sastaspace prod.
#
# Run on the prod box. Cloudflare Tunnel points stdb.sastaspace.com → localhost:3100.
# JWT keypair must exist in ./keys/ before first start (run ./keygen.sh once).

services:
  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    # Image already runs as user `spacetime` (uid 1000 inside container).
    # Bind mounts ./data and ./keys must be owned/readable by uid 1000 on host.
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      # loopback only — cloudflared reaches it via host network
      - "127.0.0.1:3100:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/identity"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
