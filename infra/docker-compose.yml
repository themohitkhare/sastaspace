services:
  # Tombstone for the retired magic-link auth service.
  # Cloudflare Tunnel routes auth.sastaspace.com → 127.0.0.1:3170.
  # Returns 410 Gone for every path with a friendly HTML body. Lives under
  # the `stdb-native` profile; start with:
  #     docker compose --profile stdb-native up -d auth-410
  # Phase 4 (≥7 days post-cutover) runs cloudflared/remove-auth-ingress.sh
  # to drop the tunnel rule, then this container can be torn down too.
  auth-410:
    profiles: ["stdb-native"]
    image: nginx:1.29-alpine
    container_name: sastaspace-auth-410
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 50
    mem_limit: 64m
    ports:
      - "127.0.0.1:3170:80"
    volumes:
      - ./landing/auth-410.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # 410 is the expected status — wget exits non-zero, so check via
      # HTTP HEAD with curl-style status grep.
      test: ["CMD-SHELL", "wget -qO- --server-response http://127.0.0.1/ 2>&1 | grep -q '410 Gone'"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Static file server for MusicGen zips produced by the workers' deck-agent.
  # Workers write to ./deck-out/<job_id>.zip; this container serves read-only.
  # Cloudflare Tunnel routes deck.sastaspace.com → 127.0.0.1:3160.
  deck-static:
    profiles: ["stdb-native"]
    image: nginx:1.29-alpine
    container_name: sastaspace-deck-static
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3160:80"
    volumes:
      - ./deck-out:/usr/share/nginx/html:ro
      - ./deck/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    environment:
      - HOME=/home/spacetime
    tmpfs:
      - /tmp
      - /home/spacetime:uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Comment moderator: Agno + Ollama. Polls SpacetimeDB on the host loopback,
  # calls Ollama on the host loopback. Needs SPACETIME_TOKEN in
  # ./agents/moderator/.env on the host (gitignored).
  moderator:
    build:
      context: ./agents/moderator
      dockerfile: Dockerfile
    image: sastaspace-moderator:local
    container_name: sastaspace-moderator
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host  # so 127.0.0.1:3100 (stdb) and :11434 (ollama) work
    env_file:
      - ./agents/moderator/.env
    environment:
      - STDB_HTTP_URL=http://127.0.0.1:3100
      - STDB_MODULE=sastaspace
      - OLLAMA_HOST=http://127.0.0.1:11434
      - MODERATOR_MODEL=gemma3:1b
      - AGNO_TELEMETRY=false
      - POLL_SECONDS=3
    depends_on:
      spacetime:
        condition: service_healthy

  # Mastra workers process. Single Node container running multiple agents
  # behind per-agent feature flags (default off — boots and idles).
  workers:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    image: sastaspace-workers:local
    container_name: sastaspace-workers
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deck-out:/app/deck-out:rw
    env_file:
      - ../workers/.env
    environment:
      - STDB_URL=https://stdb.sastaspace.com
      - STDB_MODULE=sastaspace
      - OLLAMA_URL=http://127.0.0.1:11434
      - LOCALAI_URL=http://127.0.0.1:8080
      - DECK_AUDIO_BACKEND=acestep
      - ACESTEP_URL=http://127.0.0.1:8001
      - WORKER_AUTH_MAILER_ENABLED=false
      - WORKER_ADMIN_COLLECTOR_ENABLED=false
      - WORKER_DECK_AGENT_ENABLED=true
      - WORKER_MODERATOR_AGENT_ENABLED=false
    depends_on:
      spacetime:
        condition: service_healthy
    healthcheck:
      # Workers don't expose an HTTP port. Check that the node process is
      # still alive via pgrep. A crashed-after-boot container would show
      # Running=true in `docker compose ps` without this check (audit H4).
      test: ["CMD-SHELL", "pgrep -f 'node.*workers' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # LocalAI: self-hosted OpenAI-compatible model server. Sibling to Ollama.
  # The image + device mounts target taxila prod (AMD 7900 XTX / ROCm).
  # On Mac dev this service won't start (no /dev/kfd); override via a
  # docker-compose.override.yml that swaps the image and removes devices.
  localai:
    image: localai/localai:latest-aio-gpu-hipblas
    container_name: sastaspace-localai
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "44"     # video — `getent group video` on host
      - "993"    # render — `getent group render` on host
    volumes:
      - ./localai/models:/models
    environment:
      - MODELS_PATH=/models
      - DEBUG=false
    mem_limit: 16g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
