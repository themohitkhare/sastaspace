services:
  # Static landing — apps/landing/out is rsynced from CI (or local) into ./landing/out.
  # Cloudflare Tunnel routes sastaspace.com + www → 127.0.0.1:3110.
  landing:
    image: nginx:1.29-alpine
    container_name: sastaspace-landing
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3110:80"
    volumes:
      - ./landing/out:/usr/share/nginx/html:ro
      - ./landing/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Static notes site — apps/notes/out → ./notes/out via rsync from CI.
  # Cloudflare Tunnel routes notes.sastaspace.com → 127.0.0.1:3120.
  notes:
    image: nginx:1.29-alpine
    container_name: sastaspace-notes
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 100
    mem_limit: 128m
    ports:
      - "127.0.0.1:3120:80"
    volumes:
      - ./notes/out:/usr/share/nginx/html:ro
      - ./notes/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing/security_headers.conf:/etc/nginx/conf.d/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: sastaspace-stdb
    restart: unless-stopped
    user: "1000:1000"
    read_only: true
    environment:
      - HOME=/home/spacetime
    tmpfs:
      - /tmp
      - /home/spacetime:uid=1000,gid=1000
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 512
    command:
      - start
      - --data-dir=/stdb/data
      - --jwt-pub-key-path=/etc/spacetimedb/id_ecdsa.pub
      - --jwt-priv-key-path=/etc/spacetimedb/id_ecdsa
      - --listen-addr=0.0.0.0:3000
    volumes:
      - ./data:/stdb/data
      - ./keys:/etc/spacetimedb:ro
    ports:
      - "127.0.0.1:3100:3000"
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Comment moderator: Agno + Ollama llama-guard3:1b. Polls SpacetimeDB on the
  # host loopback, calls Ollama on the host loopback. Needs SPACETIME_TOKEN
  # in /etc/sastaspace/moderator.env on the host (gitignored).
  moderator:
    build:
      context: ./agents/moderator
      dockerfile: Dockerfile
    image: sastaspace-moderator:local
    container_name: sastaspace-moderator
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    user: "1000:1000"
    network_mode: host  # so 127.0.0.1:3100 (stdb) and :11434 (ollama) work
    env_file:
      - ./agents/moderator/.env
    environment:
      - STDB_HTTP_URL=http://127.0.0.1:3100
      - STDB_MODULE=sastaspace
      - OLLAMA_HOST=http://127.0.0.1:11434
      - MODERATOR_MODEL=gemma3:1b
      - AGNO_TELEMETRY=false
      - POLL_SECONDS=3
    depends_on:
      spacetime:
        condition: service_healthy
