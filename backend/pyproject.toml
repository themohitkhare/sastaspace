[project]
name = "sastaspace-backend"
version = "0.1.0"
description = "SastaSpace Django Backend"
requires-python = ">=3.9"
dependencies = [
    "django==3.2",
    "djangorestframework",
    "djongo",
    "python-dotenv",
    "django-allauth",
    "django-cors-headers",
    "pytesseract",
    "python-docx",
    "PyPDF2",
    "google-generativeai",
    "gunicorn",
]

[tool.uv]
dev-dependencies = [
    "pytest",
    "pytest-django",
    "black",
    "flake8",
    "mypy",
]

[tool.black]
line-length = 88
target-version = ['py39']

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true 