[tool:pytest]
DJANGO_SETTINGS_MODULE = sastaspace_project.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --maxfail=10
    --durations=10
    --cov=apps
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
testpaths = apps
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    model: Model tests
    view: View tests
    serializer: Serializer tests
    slow: Slow running tests
    ai: AI service tests 